<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" class="w-full h-auto min-w-[800px] block" style="background-color: rgb(255, 255, 255);"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1"/></pattern><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#475569"/></marker></defs><rect width="100%" height="100%" fill="url(#grid)"/><text x="400" y="50" text-anchor="middle" font-size="24" font-weight="800" fill="#1e293b" font-family="sans-serif">Session Lifecycle</text><path d="M 400 115 L 400 220" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><path d="M 400 280 L 400 420" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><path d="M 400 480 L 400 620" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><path d="M 400 680 L 400 785" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/><g transform="translate(410, 340)" class=""><text text-anchor="start" font-size="13" font-weight="600" fill="#1e293b" font-family="sans-serif" class="pointer-events-none"><tspan x="0" dy="0" stroke="white" stroke-width="5" stroke-linejoin="round" paint-order="stroke">instructor clicks "Start"</tspan></text><text text-anchor="start" font-size="13" font-weight="600" fill="#1e293b" font-family="sans-serif" class="pointer-events-none"><tspan x="0" dy="0">instructor clicks "Start"</tspan></text></g><g transform="translate(410, 540)" class=""><text text-anchor="start" font-size="13" font-weight="600" fill="#1e293b" font-family="sans-serif" class="pointer-events-none"><tspan x="0" dy="0" stroke="white" stroke-width="5" stroke-linejoin="round" paint-order="stroke">instructor clicks "Stop"</tspan><tspan x="0" dy="16" stroke="white" stroke-width="5" stroke-linejoin="round" paint-order="stroke">OR attendance window expires</tspan></text><text text-anchor="start" font-size="13" font-weight="600" fill="#1e293b" font-family="sans-serif" class="pointer-events-none"><tspan x="0" dy="0">instructor clicks "Stop"</tspan><tspan x="0" dy="16">OR attendance window expires</tspan></text></g><g transform="translate(400, 100)" class=""><circle r="12" fill="#1e293b"/></g><g transform="translate(330, 220)" class=""><rect width="140" height="60" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="2.5"/><text x="70" y="35" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a" font-family="sans-serif" class="pointer-events-none">Not Started</text></g><g transform="translate(330, 420)" class=""><rect width="140" height="60" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="2.5"/><text x="70" y="35" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a" font-family="sans-serif" class="pointer-events-none">Active</text></g><g transform="translate(330, 620)" class=""><rect width="140" height="60" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="2.5"/><text x="70" y="35" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a" font-family="sans-serif" class="pointer-events-none">Closed</text></g><g transform="translate(400, 800)" class=""><circle r="15" fill="none" stroke="#1e293b" stroke-width="3"/><circle r="10" fill="#1e293b"/></g></svg>