<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<title>QR-Guard DFD Level 0 — Context Model</title>
<desc>Data flow diagram showing QR-Guard as a central process with four external entities: Student, Instructor, Email Service, and IP Geolocation API.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .label { font-size: 11px; fill: #555; }
  .system-fill { fill: #D8F3DC; stroke: #2D6A4F; }
  .student-fill { fill: #E6F1FB; stroke: #185FA5; }
  .instructor-fill { fill: #EEEDFE; stroke: #534AB7; }
  .email-fill { fill: #FAECE7; stroke: #993C1D; }
  .ip-fill { fill: #FAEEDA; stroke: #854F0B; }
  .system-text { fill: #085041; }
  .student-text { fill: #0C447C; }
  .instructor-text { fill: #3C3489; }
  .email-text { fill: #712B13; }
  .ip-text { fill: #633806; }
  .arrow { stroke: #888; stroke-width: 0.8; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Central system -->
<ellipse cx="340" cy="220" rx="88" ry="68" class="system-fill" stroke-width="1"/>
<text class="title system-text" x="340" y="214" text-anchor="middle" dominant-baseline="central">QR-Guard</text>
<text class="label system-text" x="340" y="234" text-anchor="middle" dominant-baseline="central">Attendance system</text>

<!-- Student -->
<rect x="30" y="176" width="110" height="44" rx="4" class="student-fill" stroke-width="0.5"/>
<text class="title student-text" x="85" y="202" text-anchor="middle" dominant-baseline="central">Student</text>

<!-- Instructor -->
<rect x="540" y="176" width="110" height="44" rx="4" class="instructor-fill" stroke-width="0.5"/>
<text class="title instructor-text" x="595" y="202" text-anchor="middle" dominant-baseline="central">Instructor</text>

<!-- Email service -->
<rect x="48" y="410" width="130" height="44" rx="4" class="email-fill" stroke-width="0.5"/>
<text class="title email-text" x="113" y="436" text-anchor="middle" dominant-baseline="central">Email service</text>

<!-- IP geolocation API -->
<rect x="500" y="410" width="144" height="44" rx="4" class="ip-fill" stroke-width="0.5"/>
<text class="title ip-text" x="572" y="436" text-anchor="middle" dominant-baseline="central">IP geolocation API</text>

<!-- Student → System -->
<line x1="140" y1="190" x2="254" y2="190" class="arrow" marker-end="url(#arrow)"/>
<text class="label" x="197" y="183">Scan data, GPS, device ID,</text>
<text class="label" x="197" y="170">credentials, enrollment</text>

<!-- System → Student -->
<line x1="256" y1="236" x2="140" y2="236" class="arrow" marker-end="url(#arrow)"/>
<text class="label" x="197" y="253">Confirmation, rejection,</text>
<text class="label" x="197" y="266">dashboard, history</text>

<!-- Instructor → System -->
<line x1="540" y1="190" x2="426" y2="190" class="arrow" marker-end="url(#arrow)"/>
<text class="label" x="483" y="183" text-anchor="middle">Course config, session</text>
<text class="label" x="483" y="170" text-anchor="middle">start/stop, overrides</text>

<!-- System → Instructor -->
<line x1="424" y1="236" x2="540" y2="236" class="arrow" marker-end="url(#arrow)"/>
<text class="label" x="483" y="253" text-anchor="middle">QR display, reports,</text>
<text class="label" x="483" y="266" text-anchor="middle">CSV, live counter</text>

<!-- System → Email -->
<line x1="280" y1="280" x2="155" y2="408" class="arrow" marker-end="url(#arrow)"/>
<text class="label" x="138" y="345">Verification, warnings,</text>
<text class="label" x="138" y="358">password resets</text>

<!-- System → IP API -->
<line x1="400" y1="280" x2="538" y2="408" class="arrow" marker-end="url(#arrow)"/>
<text class="label" x="500" y="332" text-anchor="end">IP address</text>

<!-- IP API → System -->
<line x1="558" y1="408" x2="416" y2="282" class="arrow" marker-end="url(#arrow)"/>
<text class="label" x="530" y="360" text-anchor="end">Country, VPN flag</text>

<text class="label" x="340" y="486" text-anchor="middle" opacity="0.4">DFD Level 0 — Context model (Ch05)</text>
</svg>
