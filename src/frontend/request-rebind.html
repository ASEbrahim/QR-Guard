<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Device Rebind — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <script src="/scripts/api.js"></script>
  <script src="/scripts/components.js"></script>
  <script>renderNavWithBack('/student/dashboard.html', 'Back to Dashboard'); renderBottomNav('student', 'device');</script>

  <div class="container" style="max-width:520px;">
    <div id="error" class="message error"></div>
    <div id="success" class="message success"></div>

    <div class="card" style="text-align:center; padding:2.5rem 2rem;">
      <div style="font-size:2.5rem; margin-bottom:0.75rem;">&#128241;</div>
      <h1 style="margin-bottom:0.5rem;">Device Rebind</h1>
      <p class="text-muted" style="margin-bottom:1.5rem;">
        Your account is bound to one device. To switch, we'll send a rebind link to your email. You can only rebind once per semester.
      </p>
      <button id="rebindBtn" class="btn btn-primary btn-lg">Send Rebind Link</button>
    </div>
  </div>

  <script>
    document.getElementById('rebindBtn').addEventListener('click', async () => {
      const res = await apiPost('/api/auth/request-rebind');
      if (!res) return;
      const data = await res.json();
      if (res.ok) {
        showSuccess('success', data.message);
        document.getElementById('rebindBtn').disabled = true;
        document.getElementById('rebindBtn').textContent = 'Link Sent';
      } else {
        showError('error', data.error);
      }
    });
  </script>
</body>
</html>
