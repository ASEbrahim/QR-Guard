<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <h1>QR-Guard</h1>
      <p>Choose a new password</p>
    </div>

    <div id="error" class="message error" style="max-width:420px;"></div>
    <div id="success" class="message success" style="max-width:420px;"></div>

    <div class="auth-card">
      <form id="resetForm">
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Min 8 characters" minlength="8" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)">&#128065;</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Reset Password</button>
      </form>
    </div>
  </div>

  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '\u{1F648}'; }
      else { input.type = 'password'; btn.textContent = '\u{1F441}'; }
    }
  </script>
  <script src="/scripts/api.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = new URLSearchParams(window.location.search).get('token');
      if (!token) { showError('error', 'No reset token.'); return; }
      const res = await apiPost('/api/auth/reset-password', {
        token,
        newPassword: document.getElementById('password').value,
      });
      if (!res) return;
      const data = await res.json();
      if (res.ok) {
        showSuccess('success', data.message + ' Redirecting...');
        setTimeout(() => window.location.href = '/login.html', 2000);
      } else {
        showError('error', data.error);
      }
    });
  </script>
</body>
</html>
