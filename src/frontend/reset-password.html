<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="container">
    <h1>Reset Password</h1>
    <div id="error" class="message error"></div>
    <div id="success" class="message success"></div>

    <form id="resetForm" class="card">
      <div class="form-group">
        <label for="password">New Password (min 8 characters)</label>
        <input type="password" id="password" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
    </form>
  </div>

  <script src="/scripts/api.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = new URLSearchParams(window.location.search).get('token');
      if (!token) { showError('error', 'No reset token.'); return; }

      const res = await apiPost('/api/auth/reset-password', {
        token,
        newPassword: document.getElementById('password').value,
      });
      if (!res) return;
      const data = await res.json();
      if (res.ok) {
        showSuccess('success', data.message + ' Redirecting...');
        setTimeout(() => window.location.href = '/login.html', 2000);
      } else {
        showError('error', data.error);
      }
    });
  </script>
</body>
</html>
