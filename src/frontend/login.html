<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <img src="/assets/auk-logo.svg" alt="AUK" style="height:140px; margin-bottom:1rem;">
      <h1>QR-Guard</h1>
      <p>Location-based attendance for AUK</p>
    </div>

    <div id="error" class="message error" role="alert" style="max-width:420px;"></div>

    <div class="auth-card">
      <h2 style="text-align:center; margin-bottom:1.5rem;">Log In</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="name@auk.edu.kw" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Min 8 characters" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)">Show</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Log In</button>
      </form>
    </div>

    <div class="auth-footer">
      <a href="/forgot-password.html">Forgot password?</a> &middot; <a href="/register.html">Create account</a>
    </div>
  </div>

  <script src="/scripts/api.js"></script>
  <script src="/scripts/fingerprint.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('error').style.display = 'none';
      const btn = e.target.querySelector('button[type="submit"]');
      const restore = setButtonLoading(btn);
      const stopLoader = showPageLoader();

      let deviceFingerprint = null;
      try {
        deviceFingerprint = await getFingerprint();
      } catch (err) {
        console.warn('FingerprintJS failed, proceeding without:', err);
      }

      const res = await apiPost('/api/auth/login', {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        deviceFingerprint,
      });
      restore(); stopLoader();
      if (!res) return;
      const data = await res.json();

      if (res.ok) {
        window.location.href = data.redirectUrl;
      } else {
        if (data.code === 'not_verified') {
          const errEl = document.getElementById('error');
          errEl.textContent = data.error + ' ';
          const resendLink = document.createElement('a');
          resendLink.href = '#';
          resendLink.id = 'resendLink';
          resendLink.style.cssText = 'color:var(--primary);font-weight:600;';
          resendLink.textContent = 'Resend verification email';
          errEl.appendChild(resendLink);
          errEl.style.display = 'block';
          resendLink.addEventListener('click', async (ev) => {
            ev.preventDefault();
            const r = await apiPost('/api/auth/resend-verification', { email: document.getElementById('email').value });
            if (r && r.ok) { const d = await r.json(); errEl.textContent = d.message; errEl.className = 'message success'; }
          });
        } else {
          showError('error', data.error || 'Login failed');
        }
      }
    });
  </script>
</body>
</html>
