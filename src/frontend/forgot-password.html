<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <h1>QR-Guard</h1>
      <p>Reset your password</p>
    </div>

    <div id="error" class="message error" style="max-width:420px;"></div>
    <div id="success" class="message success" style="max-width:420px;"></div>

    <div class="auth-card">
      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Your AUK Email</label>
          <input type="email" id="email" placeholder="name@auk.edu.kw" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Send Reset Link</button>
      </form>
    </div>

    <div class="auth-footer"><a href="/login.html">Back to login</a></div>
  </div>

  <script src="/scripts/api.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await apiPost('/api/auth/forgot-password', {
        email: document.getElementById('email').value,
      });
      if (!res) return;
      const data = await res.json();
      showSuccess('success', data.message);
    });
  </script>
</body>
</html>
