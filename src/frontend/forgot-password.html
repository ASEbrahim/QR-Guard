<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="container">
    <h1>Forgot Password</h1>
    <div id="error" class="message error"></div>
    <div id="success" class="message success"></div>

    <form id="forgotForm" class="card">
      <div class="form-group">
        <label for="email">Your AUK Email</label>
        <input type="email" id="email" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
    </form>

    <p class="text-center text-muted mt-2"><a href="/login.html">Back to login</a></p>
  </div>

  <script src="/scripts/api.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await apiPost('/api/auth/forgot-password', {
        email: document.getElementById('email').value,
      });
      if (!res) return;
      const data = await res.json();
      showSuccess('success', data.message);
    });
  </script>
</body>
</html>
