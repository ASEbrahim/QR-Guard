<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-left">
      <a href="/" class="nav-brand"><img src="/assets/auk-logo.svg" alt="AUK" style="height:28px;vertical-align:middle;margin-right:8px;">QR-Guard</a>
      <span class="nav-user-name" id="userName"></span>
    </div>
    <div class="nav-right">
      <button class="nav-menu-btn" onclick="document.getElementById('navMenu').classList.toggle('open')">&#9776;</button>
      <div class="nav-dropdown" id="navMenu">
        <a href="/student/dashboard.html">My Courses</a>
        <a href="/student/scan.html">Scan QR</a>
        <a href="/request-rebind.html">Rebind Device</a>
        <div class="divider"></div>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container-wide">
    <h1>My Courses</h1>

    <!-- Enroll in a course -->
    <div class="card">
      <h2>Enroll in a Course</h2>
      <div id="enrollError" class="message error"></div>
      <div id="enrollSuccess" class="message success"></div>
      <form id="enrollForm" style="display:flex; gap:0.5rem; align-items:end;">
        <div class="form-group" style="flex:1; margin:0;">
          <label for="codeInput">Enrollment Code</label>
          <input type="text" id="codeInput" placeholder="e.g. ABCD23" maxlength="6" style="text-transform:uppercase; letter-spacing:0.15em; font-weight:600;" required>
        </div>
        <button type="submit" class="btn btn-primary">Enroll</button>
      </form>
    </div>

    <!-- Enrolled courses -->
    <div id="coursesList"></div>
    <p id="noCourses" class="text-muted text-center" style="display:none;">You're not enrolled in any courses yet.</p>
  </div>

  <script src="/scripts/api.js"></script>
  <script>
    async function loadDashboard() {
      const meRes = await apiGet('/api/auth/me');
      if (!meRes || !meRes.ok) return;
      const { user } = await meRes.json();
      document.getElementById('userName').textContent = user.name;

      const res = await apiGet('/api/courses');
      if (!res || !res.ok) return;
      const { courses } = await res.json();

      const container = document.getElementById('coursesList');
      if (courses.length === 0) {
        document.getElementById('noCourses').style.display = 'block';
        return;
      }

      container.innerHTML = courses.map(c => {
        const pct = c.attendancePct !== null && c.attendancePct !== undefined ? c.attendancePct.toFixed(1) : null;
        const pctColor = pct === null ? 'var(--text-muted)' : parseFloat(pct) >= 85 ? 'var(--success)' : parseFloat(pct) >= 70 ? 'var(--warning)' : 'var(--danger)';
        return `
        <div class="card card-accent" style="display:flex; justify-content:space-between; align-items:center; gap:1rem;">
          <div style="flex:1;">
            <h2 style="margin-bottom:0.25rem;">${c.code} — ${c.name}</h2>
            <p class="text-muted">Section ${c.section} · ${c.semester}</p>
          </div>
          <div style="text-align:center; min-width:70px;">
            <div style="font-size:1.5rem; font-weight:800; color:${pctColor};">${pct ? pct + '%' : 'N/A'}</div>
            <div class="text-muted" style="font-size:0.7rem;">attendance</div>
          </div>
          <a href="/student/scan.html" class="btn btn-primary btn-lg">Scan QR</a>
        </div>`;
      }).join('');
    }

    document.getElementById('enrollForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('enrollError').style.display = 'none';
      document.getElementById('enrollSuccess').style.display = 'none';

      const code = document.getElementById('codeInput').value.toUpperCase();

      const res = await apiPost('/api/courses/enroll', { enrollmentCode: code });
      if (!res) return;
      const data = await res.json();

      if (res.ok) {
        showSuccess('enrollSuccess', data.message);
        loadDashboard();
      } else {
        showError('enrollError', data.error);
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await apiPost('/api/auth/logout');
      window.location.href = '/login.html';
    });

    loadDashboard();
  </script>
</body>
</html>
