<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Attendance — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
  <style>
    .scan-container { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem; }
    #reader { width: 100%; border-radius: var(--radius); overflow: hidden; }
    #result { text-align: center; margin-top: 1rem; padding: 1.25rem; border-radius: var(--radius); font-weight: 600; }
    .result-success { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
    .result-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .result-info { background: #eff6ff; color: #1a56db; border: 1px solid #bfdbfe; }
    .gps-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem; }
    .gps-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
    .gps-dot.active { background: #16a34a; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .scan-hero { text-align: center; margin-bottom: 1.5rem; }
    .scan-hero h1 { font-size: 1.35rem; margin-bottom: 0.25rem; }
  </style>
</head>
<body>
  <script src="/scripts/api.js"></script>
  <script src="/scripts/components.js"></script>
  <script>renderNavWithBack('/student/dashboard.html', 'Back to Dashboard'); renderBottomNav('student', 'scan');</script>

  <div class="scan-container">
    <div class="scan-hero">
      <h1>Scan QR Code</h1>
      <p class="text-muted">Point your camera at the QR code displayed by your instructor.</p>
    </div>

    <div class="gps-bar">
      <span class="gps-dot" id="gpsDot"></span>
      <span id="gpsStatus">Requesting GPS...</span>
    </div>

    <div id="reader"></div>
    <div id="result" style="display:none;"></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="/scripts/fingerprint.js"></script>
  <script>
    let scanning = false;
    let gpsData = null;

    // Request GPS immediately
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        gpsData = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy };
        document.getElementById('gpsDot').classList.add('active');
        document.getElementById('gpsStatus').textContent =
          `GPS locked: ${gpsData.lat.toFixed(4)}, ${gpsData.lng.toFixed(4)} (${gpsData.accuracy.toFixed(0)}m)`;
      },
      (err) => {
        document.getElementById('gpsStatus').textContent = `GPS unavailable: ${err.message}`;
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );

    // Start camera scanner
    const scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      () => {}
    ).catch((err) => {
      showResult('Camera unavailable — ' + err, 'error');
    });

    async function onScanSuccess(decodedText) {
      if (scanning) return;
      scanning = true;
      try { await scanner.stop(); } catch {}

      if (!gpsData) {
        showResult('GPS not available yet. Allow location access and reload.', 'error');
        scanning = false;
        return;
      }

      showResult('Verifying attendance...', 'info');

      let fingerprint = 'unknown';
      try { fingerprint = await getFingerprint(); } catch (err) {
        console.warn('FingerprintJS failed, proceeding with fallback:', err);
      }

      const res = await apiPost('/api/scan', {
        qrPayload: decodedText,
        gpsLat: gpsData.lat,
        gpsLng: gpsData.lng,
        gpsAccuracy: gpsData.accuracy,
        deviceFingerprint: fingerprint,
      });

      if (!res) { scanning = false; return; }
      const data = await res.json();

      if (res.ok) {
        showResult('Attendance recorded', 'success');
      } else {
        // Show specific guidance per error code
        const messages = {
          device_mismatch: 'This is not your registered device. You can only scan from the phone you first logged in with. To switch devices, go to Dashboard > Device > Send Rebind Link.',
          qr_expired: 'This QR code has expired. Wait for it to refresh (every 25 seconds) and scan the new one.',
          location_failed: 'Location verification failed. Make sure your VPN is off and you are connected to a Kuwait network.',
          gps_accuracy_failed: 'GPS signal is too weak or appears spoofed. Move to an area with better GPS reception and try again.',
          outside_geofence: 'You are outside the classroom area. Move closer to the classroom and try again.',
          already_recorded: 'Your attendance is already recorded for this session.',
          course_not_found: 'This session could not be found. Contact your instructor.',
        };
        const msg = messages[data.code] || data.error || 'Scan failed. Try again.';
        showResult(msg, data.code === 'already_recorded' ? 'info' : 'error');

        // Auto-retry for transient errors (not device/already recorded)
        if (data.code !== 'device_mismatch' && data.code !== 'already_recorded') {
          setTimeout(() => {
            scanning = false;
            document.getElementById('result').style.display = 'none';
            scanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess, () => {}).catch(() => {});
          }, 3000);
        }
      }
    }

    function showResult(message, type) {
      const el = document.getElementById('result');
      el.textContent = (type === 'success' ? '\u2713 ' : type === 'error' ? '\u2717 ' : '') + message;
      el.className = `result-${type}`;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
