<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Detail | QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <script src="/scripts/api.js"></script>
  <script src="/scripts/components.js"></script>
  <script>
    // Read course id from query if present so the Back link returns to the
    // right course detail page; falls back to the dashboard.
    (function () {
      const params = new URLSearchParams(window.location.search);
      const back = params.get('courseId')
        ? `/instructor/course?id=${params.get('courseId')}`
        : '/instructor/dashboard';
      const label = params.get('courseId') ? 'Back to Course' : 'Back to Courses';
      renderNavWithBack(back, label);
    })();
  </script>

  <div class="container-wide">
    <!-- Hero: course + session header -->
    <div id="sessionInfo" class="course-hero">
      <h1 id="sessionTitle" class="course-hero-title">Loading...</h1>
      <p id="sessionMeta" class="course-hero-meta"></p>

      <!-- Status pill rendered inline so it inherits the hero contrast -->
      <div id="statusBadge" class="session-status-badge" hidden></div>

      <div class="stat-tiles">
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="statPresent">&ndash;</span></div>
          <div class="stat-tile-label">Present</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="statAbsent">&ndash;</span></div>
          <div class="stat-tile-label">Absent</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="statExcused">&ndash;</span></div>
          <div class="stat-tile-label">Excused</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="statTotal">&ndash;</span></div>
          <div class="stat-tile-label">Enrolled</div>
        </div>
      </div>
    </div>

    <div id="rosterError" class="message error" role="alert" style="display:none;"></div>

    <h2 class="section-heading">Roster</h2>
    <div id="rosterList" class="roster-list"></div>
    <p id="rosterEmpty" class="text-muted text-center" style="display:none;">No students enrolled in this course.</p>

  </div>

  <!-- Override bottom sheet -->
  <div class="sheet-backdrop" id="overrideBackdrop"></div>
  <div class="bottom-sheet" id="overrideSheet" role="dialog" aria-labelledby="overrideTitle" aria-modal="true" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="overrideTitle">Override <span id="overrideStudent"></span></h3>
      <button type="button" class="sheet-close" id="overrideClose" aria-label="Close">&times;</button>
    </div>

    <div class="form-group">
      <label for="overrideStatus">New status</label>
      <select id="overrideStatus"></select>
    </div>
    <div class="form-group">
      <label for="overrideReason">Reason</label>
      <input type="text" id="overrideReason" placeholder="e.g. Doctor's note, sick day, fire drill" required>
    </div>

    <div id="overrideError" class="message error" role="alert" style="display:none;"></div>

    <div class="sheet-actions">
      <button type="button" class="btn btn-secondary" id="overrideCancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="overrideSubmit">Apply override</button>
    </div>
  </div>

  <script>
    const sessionId = new URLSearchParams(window.location.search).get('id');
    if (!sessionId) window.location.href = '/instructor/dashboard';

    async function loadSession() {
      const res = await apiGet(`/api/sessions/${sessionId}/detail`);
      if (!res || !res.ok) {
        const err = document.getElementById('rosterError');
        err.textContent = res && res.status === 403
          ? 'You are not authorized to view this session.'
          : 'Could not load session detail.';
        err.style.display = 'block';
        document.getElementById('sessionTitle').textContent = 'Unable to load';
        return;
      }
      const data = await res.json();

      const start = new Date(data.session.scheduledStart);
      const end = new Date(data.session.scheduledEnd);
      const dateLine = start.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
      const timeLine = `${start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} - ${end.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

      const course = data.session.course;
      document.getElementById('sessionTitle').textContent = `${course.code} | ${course.name}`;
      document.getElementById('sessionMeta').textContent = `${dateLine} . ${timeLine} . Section ${course.section}`;

      const badge = document.getElementById('statusBadge');
      badge.textContent = data.session.status.toUpperCase();
      badge.className = `session-status-badge status-${data.session.status}`;
      badge.hidden = false;

      document.getElementById('statPresent').textContent = data.stats.present;
      document.getElementById('statAbsent').textContent = data.stats.absent;
      document.getElementById('statExcused').textContent = data.stats.excused;
      document.getElementById('statTotal').textContent = data.stats.total;

      renderRoster(data.roster);
    }

    function renderRoster(roster) {
      const list = document.getElementById('rosterList');
      const empty = document.getElementById('rosterEmpty');
      if (!roster || roster.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      list.innerHTML = roster.map((r) => {
        const time = r.recordedAt
          ? new Date(r.recordedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : '';
        // Sort order is by name (server-side); status pill is the visual
        // anchor on the right so the eye scans down a column of pills.
        return `
          <div class="roster-row" data-student-id="${esc(r.studentId)}">
            <div class="roster-name">
              ${esc(r.name)}
              ${r.universityId ? `<div class="roster-meta">${esc(r.universityId)}</div>` : ''}
              ${r.excuseReason ? `<div class="roster-meta">Reason: ${esc(r.excuseReason)}</div>` : ''}
            </div>
            <span class="roster-time">${time}</span>
            <span class="roster-status-pill status-${r.status}">${r.status}</span>
            <button type="button" class="btn btn-secondary btn-sm roster-override-btn"
                    data-student-id="${esc(r.studentId)}"
                    data-current-status="${esc(r.status)}">
              Override
            </button>
          </div>
        `;
      }).join('');

      // Wire override clicks once per row (event delegation would also work
      // but per-button keeps the handler local).
      for (const btn of list.querySelectorAll('.roster-override-btn')) {
        btn.addEventListener('click', () => onOverrideClick(btn));
      }
    }

    function onOverrideClick(btn) {
      const studentId = btn.dataset.studentId;
      const current = btn.dataset.currentStatus;
      const row = btn.closest('.roster-row');
      const name = row.querySelector('.roster-name').firstChild.textContent.trim();
      openOverrideSheet({ studentId, current, name });
    }

    // --- Override bottom sheet ---
    const STATUSES = ['present', 'absent', 'excused'];

    function openOverrideSheet({ studentId, current, name }) {
      const sheet = document.getElementById('overrideSheet');
      document.getElementById('overrideStudent').textContent = name;
      document.getElementById('overrideError').style.display = 'none';
      document.getElementById('overrideReason').value = '';
      const statusSel = document.getElementById('overrideStatus');
      statusSel.innerHTML = STATUSES.map((s) =>
        `<option value="${s}"${s === current ? '' : ''}>${s}</option>`,
      ).join('');
      // Pre-select something OTHER than current so the override actually flips
      const next = STATUSES.find((s) => s !== current) || 'present';
      statusSel.value = next;
      sheet.dataset.studentId = studentId;

      document.getElementById('overrideBackdrop').classList.add('open');
      sheet.classList.add('open');
      sheet.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      openModal(sheet);
      enableSheetDrag(sheet, closeOverrideSheet);
    }

    function closeOverrideSheet() {
      const sheet = document.getElementById('overrideSheet');
      document.getElementById('overrideBackdrop').classList.remove('open');
      sheet.classList.remove('open');
      sheet.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      closeModal(sheet);
    }

    async function submitOverride() {
      const sheet = document.getElementById('overrideSheet');
      const studentId = sheet.dataset.studentId;
      const status = document.getElementById('overrideStatus').value;
      const reason = document.getElementById('overrideReason').value.trim();
      const err = document.getElementById('overrideError');
      err.style.display = 'none';
      if (!reason) {
        err.textContent = 'A reason is required for overrides.';
        err.style.display = 'block';
        return;
      }
      const btn = document.getElementById('overrideSubmit');
      const restore = setButtonLoading(btn);
      const res = await apiPost(`/api/sessions/${sessionId}/override`, { studentId, status, reason });
      restore();
      if (res && res.ok) {
        closeOverrideSheet();
        loadSession(); // refresh roster + stats
      } else {
        let msg = 'Override failed. Try again.';
        if (res) { try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {} }
        err.textContent = msg;
        err.style.display = 'block';
      }
    }

    // Wire override sheet buttons once
    document.getElementById('overrideClose').addEventListener('click', closeOverrideSheet);
    document.getElementById('overrideCancel').addEventListener('click', closeOverrideSheet);
    document.getElementById('overrideBackdrop').addEventListener('click', closeOverrideSheet);
    document.getElementById('overrideSubmit').addEventListener('click', submitOverride);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('overrideSheet').classList.contains('open')) {
        closeOverrideSheet();
      }
    });

    loadSession();
  </script>
</body>
</html>
