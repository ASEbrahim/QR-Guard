<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Detail | QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css?v=20260511b">
</head>
<body>
  <script src="/scripts/api.js?v=20260511b"></script>
  <script src="/scripts/components.js?v=20260511b"></script>
  <script>
    // Read course id from query if present so the Back link returns to the
    // right course detail page; falls back to the dashboard.
    (function () {
      const params = new URLSearchParams(window.location.search);
      const back = params.get('courseId')
        ? `/instructor/course?id=${params.get('courseId')}`
        : '/instructor/dashboard';
      const label = params.get('courseId') ? 'Back to Course' : 'Back to Courses';
      renderNavWithBack(back, label);
    })();
  </script>

  <div class="container-wide">
    <!-- Hero: course + session header -->
    <div id="sessionInfo" class="course-hero">
      <h1 id="sessionTitle" class="course-hero-title">Loading...</h1>
      <p id="sessionMeta" class="course-hero-meta"></p>

      <!-- Status pill rendered inline so it inherits the hero contrast -->
      <div id="statusBadge" class="session-status-badge" hidden></div>

      <div class="stat-tiles">
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="statPresent">&ndash;</span></div>
          <div class="stat-tile-label">Present</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="statAbsent">&ndash;</span></div>
          <div class="stat-tile-label">Absent</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="statExcused">&ndash;</span></div>
          <div class="stat-tile-label">Excused</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="statTotal">&ndash;</span></div>
          <div class="stat-tile-label">Enrolled</div>
        </div>
      </div>
    </div>

    <div id="rosterError" class="message error" role="alert" style="display:none;"></div>

    <h2 class="section-heading">Roster</h2>

    <!-- Bulk-actions bar: appears only when at least one row is checked -->
    <div id="bulkBar" class="bulk-bar" hidden>
      <span><span id="bulkCount">0</span> selected</span>
      <select id="bulkStatus">
        <option value="present">Mark present</option>
        <option value="absent">Mark absent</option>
        <option value="excused" selected>Mark excused</option>
      </select>
      <input type="text" id="bulkReason" placeholder="Reason (required)" style="flex:1 1 12rem; min-width:0;">
      <button type="button" class="btn btn-primary btn-sm" id="bulkApply">Apply to all</button>
      <button type="button" class="btn btn-secondary btn-sm" id="bulkClear">Clear</button>
    </div>

    <div id="rosterList" class="roster-list"></div>
    <p id="rosterEmpty" class="text-muted text-center" style="display:none;">No students enrolled in this course.</p>

    <h2 class="section-heading">Session notes</h2>
    <div class="notes-card">
      <textarea id="sessionNotes" rows="3" placeholder="e.g. 'midterm review', 'guest lecture', 'fire drill at 11:30'" maxlength="2000"></textarea>
      <div class="notes-card-actions">
        <span id="notesStatus" class="text-muted notes-status"></span>
        <button type="button" class="btn btn-secondary btn-sm" id="notesSave">Save notes</button>
      </div>
    </div>

    <details id="rejectedSection" class="rejected-section" hidden>
      <summary>
        <span id="rejectedHeading">Rejected scan attempts</span>
      </summary>
      <div id="rejectedList" class="rejected-list"></div>
    </details>

  </div>

  <!-- Override bottom sheet -->
  <div class="sheet-backdrop" id="overrideBackdrop"></div>
  <div class="bottom-sheet" id="overrideSheet" role="dialog" aria-labelledby="overrideTitle" aria-modal="true" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="overrideTitle">Override <span id="overrideStudent"></span></h3>
      <button type="button" class="sheet-close" id="overrideClose" aria-label="Close">&times;</button>
    </div>

    <div class="form-group">
      <label for="overrideStatus">New status</label>
      <select id="overrideStatus"></select>
    </div>
    <div class="form-group">
      <label for="overrideReason">Reason</label>
      <input type="text" id="overrideReason" placeholder="e.g. Doctor's note, sick day, fire drill" required>
    </div>

    <div id="overrideError" class="message error" role="alert" style="display:none;"></div>

    <div class="sheet-actions">
      <button type="button" class="btn btn-secondary" id="overrideCancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="overrideSubmit">Apply override</button>
    </div>
  </div>

  <script>
    const sessionId = new URLSearchParams(window.location.search).get('id');
    if (!sessionId) window.location.href = '/instructor/dashboard';

    async function loadSession() {
      const res = await apiGet(`/api/sessions/${sessionId}/detail`);
      if (!res || !res.ok) {
        const err = document.getElementById('rosterError');
        err.textContent = res && res.status === 403
          ? 'You are not authorized to view this session.'
          : 'Could not load session detail.';
        err.style.display = 'block';
        document.getElementById('sessionTitle').textContent = 'Unable to load';
        return;
      }
      const data = await res.json();

      const start = new Date(data.session.scheduledStart);
      const end = new Date(data.session.scheduledEnd);
      const dateLine = start.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
      const timeLine = `${start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} - ${end.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

      const course = data.session.course;
      document.getElementById('sessionTitle').textContent = `${course.code} | ${course.name}`;
      document.getElementById('sessionMeta').textContent = `${dateLine} . ${timeLine} . Section ${course.section}`;

      const badge = document.getElementById('statusBadge');
      badge.textContent = data.session.status.toUpperCase();
      badge.className = `session-status-badge status-${data.session.status}`;
      badge.hidden = false;

      document.getElementById('statPresent').textContent = data.stats.present;
      document.getElementById('statAbsent').textContent = data.stats.absent;
      document.getElementById('statExcused').textContent = data.stats.excused;
      document.getElementById('statTotal').textContent = data.stats.total;

      renderRoster(data.roster);
      renderRejected(data.rejected);
      document.getElementById('sessionNotes').value = data.session.notes || '';
      // Stash the loaded value so the save button can compare and avoid
      // pointless PATCHes when the user clicks Save without changes.
      document.getElementById('sessionNotes').dataset.original = data.session.notes || '';

      // courseId comes from session.courseId so a deep-link without ?courseId
      // in the URL can still POST notes back via /api/courses/<id>/sessions/<id>.
      window.__courseIdForNotes = data.session.courseId;
    }

    async function saveNotes() {
      const ta = document.getElementById('sessionNotes');
      const status = document.getElementById('notesStatus');
      const value = ta.value;
      if (value === (ta.dataset.original || '')) {
        status.textContent = 'No changes';
        setTimeout(() => { status.textContent = ''; }, 1500);
        return;
      }
      const btn = document.getElementById('notesSave');
      const restore = setButtonLoading(btn);
      const courseId = window.__courseIdForNotes;
      const res = await apiPatch(`/api/courses/${courseId}/sessions/${sessionId}`, { notes: value || null });
      restore();
      if (res && res.ok) {
        ta.dataset.original = value;
        status.textContent = 'Saved';
        setTimeout(() => { status.textContent = ''; }, 1500);
      } else {
        let msg = 'Could not save notes.';
        if (res) { try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {} }
        status.textContent = msg;
      }
    }

    // Map raw audit-log reasons to a human-friendly label. Falls back to the
    // raw token so new reasons appear (just less polished) instead of being
    // silently swallowed.
    const REASON_LABELS = {
      outside_geofence:    'Outside geofence',
      wrong_device:        'Wrong device',
      qr_expired:          'QR code expired',
      qr_invalid:          'QR code invalid',
      gps_inaccurate:      'GPS not accurate enough',
      ip_outside_kuwait:   'IP outside Kuwait',
      vpn_detected:        'VPN / proxy detected',
      already_recorded:    'Already recorded this session',
      ip_check_skipped:    'IP check skipped (FAIL-OPEN)',
      attendance_insert_failed: 'Database insert failed',
      course_not_found:    'Course not found',
    };
    function reasonLabel(r) { return REASON_LABELS[r] || (r || 'Unknown reason'); }

    function renderRejected(rejected) {
      const section = document.getElementById('rejectedSection');
      const list = document.getElementById('rejectedList');
      const heading = document.getElementById('rejectedHeading');

      if (!rejected || rejected.length === 0) {
        section.hidden = true;
        return;
      }
      section.hidden = false;
      heading.textContent = `Rejected scan attempts (${rejected.length})`;

      // Group by reason for the eyeball-scan view; ungrouped chronological
      // detail lives inside each group.
      const groups = new Map();
      for (const r of rejected) {
        const key = r.reason || 'unknown';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(r);
      }
      // Sort groups by descending count so the most common reason is first
      const sortedGroups = [...groups.entries()].sort((a, b) => b[1].length - a[1].length);

      list.innerHTML = sortedGroups.map(([reason, items]) => `
        <div class="rejected-group">
          <div class="rejected-group-header">
            <span class="rejected-count">${items.length}x</span>
            ${esc(reasonLabel(reason))}
          </div>
          <div class="rejected-items">
            ${items.map((r) => {
              const time = new Date(r.timestamp).toLocaleString([], {
                month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit',
              });
              return `
                <div class="rejected-item">
                  <span class="rejected-time">${time}</span>
                  <span class="rejected-student">${esc(r.studentName || 'Unknown student')}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `).join('');
    }

    function renderRoster(roster) {
      const list = document.getElementById('rosterList');
      const empty = document.getElementById('rosterEmpty');
      if (!roster || roster.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      list.innerHTML = roster.map((r) => {
        const time = r.recordedAt
          ? new Date(r.recordedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : '';
        // Sort order is by name (server-side); status pill is the visual
        // anchor on the right so the eye scans down a column of pills.
        return `
          <div class="roster-row" data-student-id="${esc(r.studentId)}">
            <input type="checkbox" class="roster-check" aria-label="Select ${esc(r.name)}">
            <div class="roster-name">
              ${esc(r.name)}
              ${r.universityId ? `<div class="roster-meta">${esc(r.universityId)}</div>` : ''}
              ${r.excuseReason ? `<div class="roster-meta">Reason: ${esc(r.excuseReason)}</div>` : ''}
            </div>
            <span class="roster-time">${time}</span>
            <span class="roster-status-pill status-${r.status}">${r.status}</span>
            <button type="button" class="btn btn-secondary btn-sm roster-override-btn"
                    data-student-id="${esc(r.studentId)}"
                    data-current-status="${esc(r.status)}">
              Override
            </button>
          </div>
        `;
      }).join('');

      // Wire override clicks once per row (event delegation would also work
      // but per-button keeps the handler local).
      for (const btn of list.querySelectorAll('.roster-override-btn')) {
        btn.addEventListener('click', () => onOverrideClick(btn));
      }
      // Wire checkbox changes - they update the bulk bar visibility/count.
      for (const cb of list.querySelectorAll('.roster-check')) {
        cb.addEventListener('change', updateBulkBar);
      }
    }

    function selectedStudentIds() {
      return Array.from(document.querySelectorAll('.roster-row .roster-check:checked'))
        .map((cb) => cb.closest('.roster-row').dataset.studentId);
    }
    function updateBulkBar() {
      const ids = selectedStudentIds();
      const bar = document.getElementById('bulkBar');
      document.getElementById('bulkCount').textContent = ids.length;
      bar.hidden = ids.length === 0;
    }
    function clearSelection() {
      for (const cb of document.querySelectorAll('.roster-check')) cb.checked = false;
      updateBulkBar();
    }
    async function applyBulk() {
      const ids = selectedStudentIds();
      const status = document.getElementById('bulkStatus').value;
      const reason = document.getElementById('bulkReason').value.trim();
      if (ids.length === 0) return;
      if (!reason) {
        alert('A reason is required for overrides.');
        return;
      }
      const btn = document.getElementById('bulkApply');
      const restore = setButtonLoading(btn);
      // Serial loop so the server's per-student transaction + notification
      // checks all run cleanly without head-of-line blocking. With <=300
      // students per course this is well under a second of wall time.
      let failures = 0;
      for (const studentId of ids) {
        const res = await apiPost(`/api/sessions/${sessionId}/override`, { studentId, status, reason });
        if (!res || !res.ok) failures++;
      }
      restore();
      if (failures > 0) {
        alert(`${failures} of ${ids.length} overrides failed. The rest were applied.`);
      }
      document.getElementById('bulkReason').value = '';
      clearSelection();
      loadSession();
    }

    function onOverrideClick(btn) {
      const studentId = btn.dataset.studentId;
      const current = btn.dataset.currentStatus;
      const row = btn.closest('.roster-row');
      const name = row.querySelector('.roster-name').firstChild.textContent.trim();
      openOverrideSheet({ studentId, current, name });
    }

    // --- Override bottom sheet ---
    const STATUSES = ['present', 'absent', 'excused'];

    function openOverrideSheet({ studentId, current, name }) {
      const sheet = document.getElementById('overrideSheet');
      document.getElementById('overrideStudent').textContent = name;
      document.getElementById('overrideError').style.display = 'none';
      document.getElementById('overrideReason').value = '';
      const statusSel = document.getElementById('overrideStatus');
      statusSel.innerHTML = STATUSES.map((s) =>
        `<option value="${s}"${s === current ? '' : ''}>${s}</option>`,
      ).join('');
      // Pre-select something OTHER than current so the override actually flips
      const next = STATUSES.find((s) => s !== current) || 'present';
      statusSel.value = next;
      sheet.dataset.studentId = studentId;

      document.getElementById('overrideBackdrop').classList.add('open');
      sheet.classList.add('open');
      sheet.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      openModal(sheet);
      enableSheetDrag(sheet, closeOverrideSheet);
    }

    function closeOverrideSheet() {
      const sheet = document.getElementById('overrideSheet');
      document.getElementById('overrideBackdrop').classList.remove('open');
      sheet.classList.remove('open');
      sheet.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      closeModal(sheet);
    }

    async function submitOverride() {
      const sheet = document.getElementById('overrideSheet');
      const studentId = sheet.dataset.studentId;
      const status = document.getElementById('overrideStatus').value;
      const reason = document.getElementById('overrideReason').value.trim();
      const err = document.getElementById('overrideError');
      err.style.display = 'none';
      if (!reason) {
        err.textContent = 'A reason is required for overrides.';
        err.style.display = 'block';
        return;
      }
      const btn = document.getElementById('overrideSubmit');
      const restore = setButtonLoading(btn);
      const res = await apiPost(`/api/sessions/${sessionId}/override`, { studentId, status, reason });
      restore();
      if (res && res.ok) {
        closeOverrideSheet();
        loadSession(); // refresh roster + stats
      } else {
        let msg = 'Override failed. Try again.';
        if (res) { try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {} }
        err.textContent = msg;
        err.style.display = 'block';
      }
    }

    // Wire bulk bar
    document.getElementById('bulkApply').addEventListener('click', applyBulk);
    document.getElementById('bulkClear').addEventListener('click', clearSelection);

    document.getElementById('notesSave').addEventListener('click', saveNotes);

    // Wire override sheet buttons once
    document.getElementById('overrideClose').addEventListener('click', closeOverrideSheet);
    document.getElementById('overrideCancel').addEventListener('click', closeOverrideSheet);
    document.getElementById('overrideBackdrop').addEventListener('click', closeOverrideSheet);
    document.getElementById('overrideSubmit').addEventListener('click', submitOverride);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('overrideSheet').classList.contains('open')) {
        closeOverrideSheet();
      }
    });

    loadSession();
  </script>
</body>
</html>
