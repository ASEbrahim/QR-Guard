<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Session — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
  <style>
    .session-layout {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem;
      text-align: center;
    }
    .session-status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .status-active {
      background: var(--success-light);
      color: var(--success);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .qr-frame {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: var(--shadow-md);
      display: inline-block;
      margin-bottom: 1.5rem;
    }
    #qrCanvas {
      width: clamp(200px, 60vw, 320px);
      height: clamp(200px, 60vw, 320px);
      border-radius: 8px;
    }
    #qrCanvas img, #qrCanvas canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 8px;
    }
    .counter-section {
      margin-bottom: 2rem;
    }
    .counter-value {
      font-size: clamp(1.75rem, 8vw, 2.5rem);
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.02em;
    }
    .counter-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    .stop-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 0.75rem 2.5rem;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .stop-btn:hover { background: #b91c1c; }
    .stop-btn:active { transform: scale(0.97); }
    .session-closed-msg {
      padding: 2rem;
      text-align: center;
    }
    .session-closed-msg h2 {
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <script src="/scripts/api.js"></script>
  <script src="/scripts/components.js"></script>
  <script>renderNavWithBack('javascript:history.back()', 'Back to Course');</script>

  <!-- Error state (hidden by default) -->
  <div class="session-layout" id="errorView" style="display:none;">
    <div style="padding:3rem 1rem; text-align:center;">
      <div style="font-size:2.5rem; margin-bottom:0.75rem;">&#9888;</div>
      <h2 id="errorTitle" style="color:var(--danger); margin-bottom:0.5rem;">Error</h2>
      <p class="text-muted mb-2" id="errorMsg"></p>
      <a href="javascript:history.back()" class="btn btn-primary btn-lg">Back to Course</a>
    </div>
  </div>

  <div class="session-layout" id="activeView">
    <!-- Visually hidden h1 so the page has a proper heading structure for
         assistive tech; the "Live" status badge carries the visible label. -->
    <h1 class="visually-hidden">Live Attendance Session</h1>
    <div style="margin-bottom:1.5rem;">
      <div class="session-status status-active" id="statusBadge">
        <span class="status-dot"></span>
        <span id="statusText">Starting...</span>
      </div>
    </div>

    <div class="qr-frame" id="qrFrame">
      <!-- QR renders client-side into #qrCanvas. The signed token payload
           is NEVER transmitted to any third party. -->
      <div id="qrCanvas" role="img" aria-label="Session QR code" style="display:none;"></div>
      <div id="qrLoading" class="text-muted" style="width:clamp(200px,60vw,320px);height:clamp(200px,60vw,320px);display:flex;align-items:center;justify-content:center;">
        Generating QR code...
      </div>
    </div>

    <div class="counter-section">
      <!-- aria-live so screen readers announce attendance updates as students check in. -->
      <div class="counter-value" id="counter" aria-live="polite" aria-atomic="true">0 / 0</div>
      <div class="counter-label">students checked in</div>
    </div>

    <button class="stop-btn" id="stopBtn">End Session</button>
  </div>

  <div class="session-layout" id="closedView" style="display:none;">
    <div class="session-closed-msg">
      <div style="font-size:2.5rem; margin-bottom:0.75rem;">&#9989;</div>
      <h2>Session Ended</h2>
      <p class="text-muted mb-2">Attendance has been recorded.</p>
      <div class="counter-value" id="finalCount" style="margin-bottom:0.5rem;"></div>
      <div class="counter-label mb-2">students attended</div>
      <a href="javascript:history.back()" class="btn btn-primary btn-lg">Back to Course</a>
    </div>
  </div>

  <!--
    Client-side QR rendering (qrcodejs v1.0.0 from cdnjs, pinned + SRI).
    The QR payload is a signed scan-authorization token — rendering it
    client-side prevents transmission to any third party.
  -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
    integrity="sha384-3zSEDfvllQohrq0PHL1fOXJuC/jSOO34H46t6UQfobFOmxE5BpjjaIJY5F2/bMnU"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <!-- Socket.IO client pinned to match server version (package.json: 4.8.3). -->
  <script
    src="https://cdn.socket.io/4.8.3/socket.io.min.js"
    integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script>
    const sessionId = new URLSearchParams(window.location.search).get('id');
    if (!sessionId) window.location.href = '/instructor/dashboard.html';

    const socket = io({ withCredentials: true });
    let currentCount = '0 / 0';

    (async () => {
      const res = await apiPost(`/api/sessions/${sessionId}/start`);
      if (!res) return;
      // A 502 during deploy may return HTML; parse defensively so we
      // show the error view instead of a blank screen.
      let data = {};
      try { data = await res.json(); } catch {}

      if (!res.ok) {
        document.getElementById('activeView').style.display = 'none';
        document.getElementById('errorView').style.display = '';
        document.getElementById('errorTitle').textContent = 'Could not start session';
        document.getElementById('errorMsg').textContent = data.error || 'Something went wrong.';
        return;
      }

      document.getElementById('statusText').textContent = 'Live';
      if (data.qrPayload) renderQr(data.qrPayload);
      socket.emit('join-session', sessionId);
    })();

    socket.on('qr:refresh', (data) => renderQr(data.payload));

    socket.on('attendance:update', (data) => {
      currentCount = `${data.present} / ${data.total}`;
      document.getElementById('counter').textContent = currentCount;
    });

    socket.on('session:closed', () => showClosed());

    // HTTP polling fallback
    let pollInterval = null;
    socket.on('disconnect', () => {
      pollInterval = setInterval(async () => {
        const res = await apiGet(`/api/sessions/${sessionId}/qr`);
        if (res && res.ok) {
          const data = await res.json();
          renderQr(data.payload);
        }
      }, 10000);
    });

    socket.on('connect', () => {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      socket.emit('join-session', sessionId);
    });

    // Surface connection errors in the console (not the UI — the polling
    // fallback kicks in on disconnect, so the user experience continues).
    socket.on('connect_error', (err) => {
      console.warn('[session] Socket.IO connect_error:', err.message || err);
    });

    // qrcodejs instance — reused across refreshes so we don't allocate a new
    // renderer every 25s. Lazily created on first render.
    let qrInstance = null;
    function renderQr(payload) {
      const container = document.getElementById('qrCanvas');
      if (typeof QRCode === 'undefined') {
        console.error('QR library failed to load (possibly SRI mismatch).');
        return;
      }
      if (qrInstance) {
        qrInstance.makeCode(payload);
      } else {
        container.innerHTML = '';
        qrInstance = new QRCode(container, {
          text: payload,
          width: 320,
          height: 320,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
      }
      container.style.display = 'block';
      document.getElementById('qrLoading').style.display = 'none';
    }

    function showClosed() {
      document.getElementById('activeView').style.display = 'none';
      document.getElementById('closedView').style.display = '';
      document.getElementById('finalCount').textContent = currentCount;
    }

    document.getElementById('stopBtn').addEventListener('click', async () => {
      if (!confirm('End this session? Students will no longer be able to scan.')) return;
      const stopRes = await apiPost(`/api/sessions/${sessionId}/stop`);
      // Only mark closed if the server actually stopped the session. A
      // failed stop (network error, 500) previously still flipped the UI,
      // giving the instructor the false impression that the session had
      // ended — while students could still scan.
      if (stopRes && stopRes.ok) {
        showClosed();
      } else {
        alert('Could not end the session. Please try again.');
      }
    });

    // Tear down the socket + polling interval when the page hides (tab
    // switch, navigation, BFCache). Without this the connection lingers
    // and, for iOS BFCache, a zombie socket can still receive events.
    window.addEventListener('pagehide', () => {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      try { socket.disconnect(); } catch {}
    });
  </script>
</body>
</html>
