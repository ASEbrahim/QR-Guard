<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Session — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
  <style>
    .session-layout {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem;
      text-align: center;
    }
    .session-status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .status-active {
      background: var(--success-light);
      color: var(--success);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .qr-frame {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: var(--shadow-md);
      display: inline-block;
      margin-bottom: 1.5rem;
    }
    #qrImage {
      width: 280px;
      height: 280px;
      border-radius: 8px;
      display: block;
    }
    .counter-section {
      margin-bottom: 2rem;
    }
    .counter-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.02em;
    }
    .counter-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    .stop-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 0.75rem 2.5rem;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .stop-btn:hover { background: #b91c1c; }
    .stop-btn:active { transform: scale(0.97); }
    .session-closed-msg {
      padding: 2rem;
      text-align: center;
    }
    .session-closed-msg h2 {
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-left">
      <a href="/" class="nav-brand"><img src="/assets/auk-logo.svg" alt="AUK" style="height:28px;vertical-align:middle;margin-right:8px;">QR-Guard</a>
    </div>
    <div class="nav-links"><a href="javascript:history.back()">&larr; Back to Course</a></div>
  </nav>

  <!-- Error state (hidden by default) -->
  <div class="session-layout" id="errorView" style="display:none;">
    <div style="padding:3rem 1rem; text-align:center;">
      <div style="font-size:2.5rem; margin-bottom:0.75rem;">&#9888;</div>
      <h2 id="errorTitle" style="color:var(--danger); margin-bottom:0.5rem;">Error</h2>
      <p class="text-muted mb-2" id="errorMsg"></p>
      <a href="javascript:history.back()" class="btn btn-primary btn-lg">Back to Course</a>
    </div>
  </div>

  <div class="session-layout" id="activeView">
    <div class="session-status status-active" id="statusBadge">
      <span class="status-dot"></span>
      <span id="statusText">Starting...</span>
    </div>

    <div class="qr-frame" id="qrFrame">
      <img id="qrImage" alt="QR Code" style="display:none;">
      <div id="qrLoading" class="text-muted" style="width:280px;height:280px;display:flex;align-items:center;justify-content:center;">
        Generating QR code...
      </div>
    </div>

    <div class="counter-section">
      <div class="counter-value" id="counter">0 / 0</div>
      <div class="counter-label">students checked in</div>
    </div>

    <button class="stop-btn" id="stopBtn">End Session</button>
  </div>

  <div class="session-layout" id="closedView" style="display:none;">
    <div class="session-closed-msg">
      <div style="font-size:2.5rem; margin-bottom:0.75rem;">&#9989;</div>
      <h2>Session Ended</h2>
      <p class="text-muted mb-2">Attendance has been recorded.</p>
      <div class="counter-value" id="finalCount" style="margin-bottom:0.5rem;"></div>
      <div class="counter-label mb-2">students attended</div>
      <a href="javascript:history.back()" class="btn btn-primary btn-lg">Back to Course</a>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/scripts/api.js"></script>
  <script>
    const sessionId = new URLSearchParams(window.location.search).get('id');
    if (!sessionId) window.location.href = '/instructor/dashboard.html';

    const socket = io({ withCredentials: true });
    let currentCount = '0 / 0';

    (async () => {
      const res = await apiPost(`/api/sessions/${sessionId}/start`);
      if (!res) return;
      const data = await res.json();

      if (!res.ok) {
        document.getElementById('activeView').style.display = 'none';
        document.getElementById('errorView').style.display = '';
        document.getElementById('errorTitle').textContent = 'Could not start session';
        document.getElementById('errorMsg').textContent = data.error || 'Something went wrong.';
        return;
      }

      document.getElementById('statusText').textContent = 'Live';
      renderQr(data.qrPayload);
      socket.emit('join-session', sessionId);
    })();

    socket.on('qr:refresh', (data) => renderQr(data.payload));

    socket.on('attendance:update', (data) => {
      currentCount = `${data.present} / ${data.total}`;
      document.getElementById('counter').textContent = currentCount;
    });

    socket.on('session:closed', () => showClosed());

    // HTTP polling fallback
    let pollInterval = null;
    socket.on('disconnect', () => {
      pollInterval = setInterval(async () => {
        const res = await apiGet(`/api/sessions/${sessionId}/qr`);
        if (res && res.ok) {
          const data = await res.json();
          renderQr(data.payload);
        }
      }, 10000);
    });

    socket.on('connect', () => {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      socket.emit('join-session', sessionId);
    });

    function renderQr(payload) {
      const url = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(payload)}`;
      const img = document.getElementById('qrImage');
      img.src = url;
      img.style.display = 'block';
      document.getElementById('qrLoading').style.display = 'none';
    }

    function showClosed() {
      document.getElementById('activeView').style.display = 'none';
      document.getElementById('closedView').style.display = '';
      document.getElementById('finalCount').textContent = currentCount;
    }

    document.getElementById('stopBtn').addEventListener('click', async () => {
      if (!confirm('End this session? Students will no longer be able to scan.')) return;
      await apiPost(`/api/sessions/${sessionId}/stop`);
      showClosed();
    });
  </script>
</body>
</html>
