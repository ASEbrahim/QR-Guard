<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instructor Dashboard — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">QR-Guard</a>
    <div class="nav-links">
      <span class="nav-user" id="userName"></span>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <div class="container-wide">
    <h1>My Courses</h1>

    <!-- Create course form (collapsible) -->
    <div class="card">
      <h2>
        <a href="#" id="toggleCreate" style="text-decoration:none; color:inherit;">+ Create New Course</a>
      </h2>
      <form id="createForm" style="display:none;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
          <div class="form-group"><label>Course Name</label><input id="cName" required></div>
          <div class="form-group"><label>Course Code</label><input id="cCode" placeholder="CSIS 330" required></div>
          <div class="form-group"><label>Section</label><input id="cSection" placeholder="01" required></div>
          <div class="form-group"><label>Semester</label><input id="cSemester" placeholder="Spring 2026" required></div>
          <div class="form-group"><label>Semester Start</label><input type="date" id="cStart" required></div>
          <div class="form-group"><label>Semester End</label><input type="date" id="cEnd" required></div>
        </div>

        <div class="mt-2">
          <label style="margin-bottom:0.5rem;">Weekly Schedule</label>
          <div id="scheduleSlots"></div>
          <button type="button" class="btn btn-secondary mt-1" id="addSlotBtn" style="font-size:0.875rem;">+ Add time slot</button>
        </div>

        <h2 class="mt-2">Geofence</h2>
        <p class="text-muted">Click the map to set the center point.</p>
        <div style="display:flex; gap:0.5rem; margin-bottom:0.5rem;">
          <input type="text" id="mapSearch" placeholder="Search location..." style="flex:1;">
          <button type="button" class="btn btn-secondary" id="mapSearchBtn">Search</button>
        </div>
        <div id="map"></div>
        <input type="hidden" id="cLat">
        <input type="hidden" id="cLng">
        <div class="form-group mt-1">
          <label>Radius (meters, 10-500)</label>
          <input type="number" id="cRadius" min="10" max="500" value="100" required>
        </div>

        <div id="createError" class="message error mt-2"></div>
        <button type="submit" class="btn btn-primary btn-block mt-2">Create Course</button>
      </form>
    </div>

    <!-- Course list -->
    <div id="coursesList"></div>
    <p id="noCourses" class="text-muted text-center" style="display:none;">No courses yet. Create one above.</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/scripts/api.js"></script>
  <script>
    let map, marker, circle;

    document.getElementById('toggleCreate').addEventListener('click', (e) => {
      e.preventDefault();
      const form = document.getElementById('createForm');
      form.style.display = form.style.display === 'none' ? '' : 'none';
      if (form.style.display !== 'none' && !map) {
        initMap();
      }
    });

    function initMap() {
      // Default: AUK campus approximate location
      map = L.map('map').setView([29.3117, 47.9835], 16);
      const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '&copy; Esri', maxZoom: 19
      });
      const labels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19
      });
      const street = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OSM &copy; CARTO', maxZoom: 20
      });

      satellite.addTo(map);
      labels.addTo(map);

      L.control.layers({ 'Satellite': satellite, 'Street': street }, { 'Labels': labels }, { position: 'topright' }).addTo(map);

      map.on('click', (e) => {
        const { lat, lng } = e.latlng;
        document.getElementById('cLat').value = lat;
        document.getElementById('cLng').value = lng;

        if (marker) map.removeLayer(marker);
        if (circle) map.removeLayer(circle);

        marker = L.marker([lat, lng]).addTo(map);
        const radius = parseInt(document.getElementById('cRadius').value) || 100;
        circle = L.circle([lat, lng], { radius, color: '#1a56db', fillOpacity: 0.15 }).addTo(map);
      });

      document.getElementById('cRadius').addEventListener('input', () => {
        if (circle && marker) {
          circle.setRadius(parseInt(document.getElementById('cRadius').value) || 100);
        }
      });

      // Location search via Nominatim (free, no API key)
      const searchInput = document.getElementById('mapSearch');
      const searchBtn = document.getElementById('mapSearchBtn');

      async function searchLocation() {
        const q = searchInput.value.trim();
        if (!q) return;
        searchBtn.textContent = '...';
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`, {
            headers: { 'Accept-Language': 'en' }
          });
          const results = await res.json();
          if (results.length === 0) { searchBtn.textContent = 'Not found'; setTimeout(() => searchBtn.textContent = 'Search', 2000); return; }
          const { lat, lon } = results[0];
          map.setView([parseFloat(lat), parseFloat(lon)], 17);
          searchBtn.textContent = 'Search';
        } catch { searchBtn.textContent = 'Search'; }
      }

      searchBtn.addEventListener('click', searchLocation);
      searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); searchLocation(); } });
    }

    // --- Schedule slot builder ---
    const DAYS = [
      { value: 'sun', label: 'Sunday' },
      { value: 'mon', label: 'Monday' },
      { value: 'tue', label: 'Tuesday' },
      { value: 'wed', label: 'Wednesday' },
      { value: 'thu', label: 'Thursday' },
      { value: 'fri', label: 'Friday' },
      { value: 'sat', label: 'Saturday' },
    ];

    // Common AUK class times
    const TIMES = [
      '08:00','08:30','09:00','09:15','09:30','10:00','10:15','10:30',
      '11:00','11:15','11:30','12:00','12:15','12:30','13:00','13:15',
      '13:30','14:00','14:15','14:30','15:00','15:15','15:30','16:00',
      '16:15','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00'
    ];

    let slotCount = 0;

    function addSlot() {
      slotCount++;
      const id = slotCount;
      const container = document.getElementById('scheduleSlots');
      const row = document.createElement('div');
      row.id = `slot-${id}`;
      row.style.cssText = 'display:flex; gap:0.5rem; align-items:center; margin-bottom:0.5rem;';
      row.innerHTML = `
        <select data-field="day" style="flex:1;">
          ${DAYS.map(d => `<option value="${d.value}">${d.label}</option>`).join('')}
        </select>
        <select data-field="start" style="flex:0.7;">
          ${TIMES.map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
        <span style="color:#64748b;">to</span>
        <select data-field="end" style="flex:0.7;">
          ${TIMES.map(t => `<option value="${t}"${t === '10:15' ? ' selected' : ''}>${t}</option>`).join('')}
        </select>
        <button type="button" onclick="document.getElementById('slot-${id}').remove()" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:1.25rem;">&times;</button>
      `;
      container.appendChild(row);
    }

    function getScheduleFromSlots() {
      const slots = document.querySelectorAll('#scheduleSlots > div');
      const schedule = [];
      slots.forEach(slot => {
        const day = slot.querySelector('[data-field="day"]').value;
        const start = slot.querySelector('[data-field="start"]').value;
        const end = slot.querySelector('[data-field="end"]').value;
        schedule.push({ day, start, end });
      });
      return schedule;
    }

    document.getElementById('addSlotBtn').addEventListener('click', addSlot);
    // Start with one slot
    addSlot();

    async function loadCourses() {
      const res = await apiGet('/api/courses');
      if (!res || !res.ok) return;
      const { courses } = await res.json();

      const container = document.getElementById('coursesList');
      if (courses.length === 0) {
        document.getElementById('noCourses').style.display = 'block';
        return;
      }
      document.getElementById('noCourses').style.display = 'none';

      container.innerHTML = courses.map(c => `
        <a href="/instructor/course.html?id=${c.courseId}" class="card card-clickable card-accent">
          <div class="flex-between">
            <div>
              <h2 style="margin-bottom:0.25rem;">${c.code} — ${c.name}</h2>
              <p class="text-muted">Section ${c.section} · ${c.semester}</p>
            </div>
            <span class="enrollment-code">${c.enrollmentCode}</span>
          </div>
        </a>
      `).join('');
    }

    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('createError').style.display = 'none';

      const lat = parseFloat(document.getElementById('cLat').value);
      const lng = parseFloat(document.getElementById('cLng').value);
      if (!lat || !lng) {
        showError('createError', 'Click the map to set a geofence center.');
        return;
      }

      const schedule = getScheduleFromSlots();
      if (schedule.length === 0) {
        showError('createError', 'Add at least one time slot.');
        return;
      }

      const res = await apiPost('/api/courses', {
        name: document.getElementById('cName').value,
        code: document.getElementById('cCode').value,
        section: document.getElementById('cSection').value,
        semester: document.getElementById('cSemester').value,
        semesterStart: document.getElementById('cStart').value,
        semesterEnd: document.getElementById('cEnd').value,
        weeklySchedule: schedule,
        geofenceLat: lat,
        geofenceLng: lng,
        geofenceRadius: parseInt(document.getElementById('cRadius').value),
      });

      if (!res) return;
      const data = await res.json();
      if (res.ok) {
        document.getElementById('createForm').style.display = 'none';
        loadCourses();
      } else {
        showError('createError', data.error);
      }
    });

    // Init
    (async () => {
      const meRes = await apiGet('/api/auth/me');
      if (!meRes || !meRes.ok) return;
      const { user } = await meRes.json();
      document.getElementById('userName').textContent = user.name;
      loadCourses();
    })();

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await apiPost('/api/auth/logout');
      window.location.href = '/login.html';
    });
  </script>
</body>
</html>
