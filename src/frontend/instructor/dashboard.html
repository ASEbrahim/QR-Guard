<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instructor Dashboard — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
    crossorigin="anonymous"
    referrerpolicy="no-referrer">
</head>
<body>
  <script src="/scripts/api.js"></script>
  <script src="/scripts/components.js"></script>
  <script>renderNav(''); renderBottomNav('instructor', 'courses');</script>

  <div class="container-wide">
    <div class="page-header">
      <h1>My Courses <span class="count-badge" id="courseCount">0</span></h1>
    </div>

    <!-- Create course form (collapsible) -->
    <div class="card" id="createCard" style="display:none;">
      <form id="createForm">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
          <div class="form-group"><label for="cName">Course Name</label><input id="cName" required></div>
          <div class="form-group"><label for="cCode">Course Code</label><input id="cCode" placeholder="CSIS 330" required></div>
          <div class="form-group"><label for="cSection">Section</label><input id="cSection" placeholder="01" required></div>
          <div class="form-group"><label for="cSemester">Semester</label><input id="cSemester" placeholder="Spring 2026" required></div>
          <div class="form-group"><label for="cStart">Semester Start</label><input type="date" id="cStart" required></div>
          <div class="form-group"><label for="cEnd">Semester End</label><input type="date" id="cEnd" required></div>
        </div>

        <div class="mt-2">
          <label id="scheduleSlotsLabel" style="margin-bottom:0.5rem; display:block;">Weekly Schedule</label>
          <div id="scheduleSlots" role="group" aria-labelledby="scheduleSlotsLabel"></div>
          <button type="button" class="btn btn-secondary mt-1" id="addSlotBtn" style="font-size:0.875rem;">+ Add time slot</button>
        </div>

        <h2 class="mt-2" id="geofenceHeading">Geofence</h2>
        <p class="text-muted" id="geofenceHelp">Click the map to set the center point, or search for a location. Keyboard: Tab to the map, use arrow keys to pan, Enter to place a marker.</p>
        <div style="position:relative; margin-bottom:0.5rem;">
          <div style="display:flex; gap:0.5rem;">
            <label for="mapSearch" class="visually-hidden">Search location</label>
            <input type="text" id="mapSearch" placeholder="Search location..." style="flex:1;" autocomplete="off" aria-describedby="geofenceHelp">
            <button type="button" class="btn btn-secondary" id="mapSearchBtn">Search</button>
          </div>
          <div id="mapSuggestions" role="listbox" aria-label="Location suggestions" style="display:none; position:absolute; left:0; right:0; top:100%; background:var(--surface); border:1px solid var(--border); border-radius:0 0 10px 10px; box-shadow:var(--shadow-md); z-index:50; max-height:200px; overflow-y:auto;"></div>
        </div>
        <div id="map" role="application" aria-labelledby="geofenceHeading" aria-describedby="geofenceHelp" tabindex="0"></div>
        <input type="hidden" id="cLat">
        <input type="hidden" id="cLng">
        <div class="form-group mt-1">
          <label for="cRadius">Radius (meters, 10-500)</label>
          <input type="number" id="cRadius" min="10" max="500" value="100" required>
        </div>

        <div id="createError" class="message error mt-2" role="alert"></div>
        <button type="submit" class="btn btn-primary btn-block mt-2">Create Course</button>
      </form>
    </div>

    <!-- Course list -->
    <div id="coursesList">
      <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div></div>
    </div>
    <p id="noCourses" class="text-muted text-center" style="display:none;">No courses yet. Tap the + to create one.</p>
  </div>

  <button type="button" id="toggleCreate" class="fab" aria-label="Create new course" title="Create new course">+</button>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <script>
    let map, marker, circle;

    document.getElementById('toggleCreate').addEventListener('click', (e) => {
      e.preventDefault();
      const card = document.getElementById('createCard');
      card.style.display = card.style.display === 'none' ? '' : 'none';
      if (card.style.display !== 'none' && !map) {
        initMap();
      }
    });

    // Leaflet maps hold event listeners on window + document; if the page
    // goes into BFCache without .remove(), those listeners persist and
    // can fire into a frozen document. Tear down on pagehide.
    window.addEventListener('pagehide', () => {
      if (map) {
        try { map.remove(); } catch {}
        map = null; marker = null; circle = null;
      }
    });

    function initMap() {
      // Default: AUK campus approximate location
      map = L.map('map').setView([29.3117, 47.9835], 16);
      const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '&copy; Esri', maxZoom: 19
      });
      const labels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 19
      });
      const street = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OSM &copy; CARTO', maxZoom: 20
      });

      satellite.addTo(map);
      labels.addTo(map);

      L.control.layers({ 'Satellite': satellite, 'Street': street }, { 'Labels': labels }, { position: 'topright' }).addTo(map);

      // Shared routine so both mouse click and keyboard actions can place
      // a marker + radius circle at the given lat/lng.
      const placeMarker = (lat, lng) => {
        document.getElementById('cLat').value = lat;
        document.getElementById('cLng').value = lng;
        if (marker) map.removeLayer(marker);
        if (circle) map.removeLayer(circle);
        marker = L.marker([lat, lng]).addTo(map);
        const radius = parseInt(document.getElementById('cRadius').value) || 100;
        circle = L.circle([lat, lng], { radius, color: '#1a56db', fillOpacity: 0.15 }).addTo(map);
      };

      map.on('click', (e) => placeMarker(e.latlng.lat, e.latlng.lng));

      // Keyboard equivalent: when the map container has focus, pressing
      // Enter or Space places a marker at the current map center. Arrow-
      // keys are already handled by Leaflet's built-in keyboard pan.
      const mapEl = document.getElementById('map');
      mapEl.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        e.preventDefault();
        const c = map.getCenter();
        placeMarker(c.lat, c.lng);
      });

      document.getElementById('cRadius').addEventListener('input', () => {
        if (circle && marker) {
          circle.setRadius(parseInt(document.getElementById('cRadius').value) || 100);
        }
      });

      // Location search with live autocomplete via Nominatim
      const searchInput = document.getElementById('mapSearch');
      const searchBtn = document.getElementById('mapSearchBtn');
      const suggestionsEl = document.getElementById('mapSuggestions');
      let debounceTimer = null;

      // AUK-area quick picks shown when input is focused and empty
      const QUICK_PICKS = [
        { name: 'American University of Kuwait (AUK)', lat: 29.3117, lon: 47.9835 },
        { name: 'AUK — Science Building', lat: 29.3121, lon: 47.9839 },
        { name: 'AUK — Liberal Arts Building', lat: 29.3113, lon: 47.9831 },
        { name: 'AUK — Auditorium', lat: 29.3119, lon: 47.9828 },
        { name: 'Kuwait University — Khaldiya', lat: 29.3266, lon: 47.9718 },
        { name: 'Kuwait University — Shuwaikh', lat: 29.3445, lon: 47.9602 },
      ];

      function showSuggestions(items) {
        if (items.length === 0) { suggestionsEl.style.display = 'none'; return; }
        suggestionsEl.innerHTML = items.map(item => `
          <div style="padding:0.6rem 0.85rem; cursor:pointer; font-size:0.85rem; border-bottom:1px solid var(--border); transition:background 0.1s;"
               onmouseenter="this.style.background='var(--primary-light)'"
               onmouseleave="this.style.background=''"
               data-lat="${item.lat}" data-lon="${item.lon}" data-name="${esc(item.display_name || item.name)}">
            ${esc(item.display_name || item.name)}
          </div>
        `).join('');
        suggestionsEl.style.display = 'block';

        suggestionsEl.querySelectorAll('[data-lat]').forEach(el => {
          el.addEventListener('click', () => {
            const lat = parseFloat(el.dataset.lat);
            const lon = parseFloat(el.dataset.lon);
            map.setView([lat, lon], 17);
            searchInput.value = el.dataset.name;
            suggestionsEl.style.display = 'none';
          });
        });
      }

      async function fetchSuggestions(q) {
        if (!q || q.length < 2) {
          showSuggestions(QUICK_PICKS);
          return;
        }
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&countrycodes=kw`, {
            headers: { 'Accept-Language': 'en' }
          });
          const results = await res.json();
          if (results.length === 0) {
            suggestionsEl.innerHTML = '<div style="padding:0.6rem 0.85rem;color:var(--text-muted);font-size:0.85rem;">No results found</div>';
            suggestionsEl.style.display = 'block';
          } else {
            showSuggestions(results);
          }
        } catch {
          suggestionsEl.style.display = 'none';
        }
      }

      searchInput.addEventListener('input', () => {
        // Nominatim usage policy: ≤ 1 req/sec per source. 300ms debounce
        // previously allowed up to 3 req/sec. 1000ms keeps us compliant
        // while still feeling responsive for normal typing speed.
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => fetchSuggestions(searchInput.value.trim()), 1000);
      });

      searchInput.addEventListener('focus', () => {
        if (!searchInput.value.trim()) showSuggestions(QUICK_PICKS);
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('#mapSearch') && !e.target.closest('#mapSuggestions')) {
          suggestionsEl.style.display = 'none';
        }
      });

      async function searchLocation() {
        const q = searchInput.value.trim();
        if (!q) return;
        suggestionsEl.style.display = 'none';
        searchBtn.textContent = '...';
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=kw`, {
            headers: { 'Accept-Language': 'en' }
          });
          const results = await res.json();
          if (results.length === 0) { searchBtn.textContent = 'Not found'; setTimeout(() => searchBtn.textContent = 'Search', 2000); return; }
          const { lat, lon } = results[0];
          map.setView([parseFloat(lat), parseFloat(lon)], 17);
          searchBtn.textContent = 'Search';
        } catch { searchBtn.textContent = 'Search'; }
      }

      searchBtn.addEventListener('click', searchLocation);
      searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); searchLocation(); suggestionsEl.style.display = 'none'; } });
    }

    // --- Schedule slot builder ---
    const DAYS = [
      { value: 'sun', label: 'Sunday' },
      { value: 'mon', label: 'Monday' },
      { value: 'tue', label: 'Tuesday' },
      { value: 'wed', label: 'Wednesday' },
      { value: 'thu', label: 'Thursday' },
      { value: 'fri', label: 'Friday' },
      { value: 'sat', label: 'Saturday' },
    ];

    // Common AUK class times
    const TIMES = [
      '08:00','08:15','08:30','08:45','08:50',
      '09:00','09:15','09:30','09:45','09:50',
      '10:00','10:15','10:30','10:45','10:50',
      '11:00','11:15','11:30','11:45','11:50',
      '12:00','12:15','12:30','12:45','12:50',
      '13:00','13:15','13:30','13:45','13:50',
      '14:00','14:15','14:30','14:45','14:50',
      '15:00','15:15','15:30','15:45','15:50',
      '16:00','16:15','16:30','16:45','16:50',
      '17:00','17:30','18:00','18:30','19:00','19:30','20:00'
    ];

    let slotCount = 0;

    function addSlot() {
      slotCount++;
      const id = slotCount;
      const container = document.getElementById('scheduleSlots');
      const row = document.createElement('div');
      row.id = `slot-${id}`;
      row.style.cssText = 'display:flex; gap:0.5rem; align-items:center; margin-bottom:0.5rem;';
      row.innerHTML = `
        <select data-field="day" style="flex:1;">
          ${DAYS.map(d => `<option value="${d.value}">${d.label}</option>`).join('')}
        </select>
        <select data-field="start" style="flex:0.7;">
          ${TIMES.map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
        <span style="color:#64748b;">to</span>
        <select data-field="end" style="flex:0.7;">
          ${TIMES.map(t => `<option value="${t}"${t === '10:15' ? ' selected' : ''}>${t}</option>`).join('')}
        </select>
        <button type="button" onclick="document.getElementById('slot-${id}').remove()" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:1.25rem;">&times;</button>
      `;
      container.appendChild(row);
    }

    function getScheduleFromSlots() {
      const slots = document.querySelectorAll('#scheduleSlots > div');
      const schedule = [];
      slots.forEach(slot => {
        const day = slot.querySelector('[data-field="day"]').value;
        const start = slot.querySelector('[data-field="start"]').value;
        const end = slot.querySelector('[data-field="end"]').value;
        schedule.push({ day, start, end });
      });
      return schedule;
    }

    document.getElementById('addSlotBtn').addEventListener('click', addSlot);
    // Start with one slot
    addSlot();

    function accentFor(code) {
      const prefix = String(code).trim().split(/\s+/)[0].toUpperCase();
      const palette = ['red', 'gold', 'blue', 'green', 'purple'];
      let hash = 0;
      for (let i = 0; i < prefix.length; i++) hash = (hash * 31 + prefix.charCodeAt(i)) >>> 0;
      return palette[hash % palette.length];
    }

    async function loadCourses() {
      const res = await apiGet('/api/courses');
      if (!res || !res.ok) return;
      const { courses } = await res.json();

      const container = document.getElementById('coursesList');
      if (courses.length === 0) {
        document.getElementById('noCourses').style.display = 'block';
        return;
      }
      document.getElementById('noCourses').style.display = 'none';

      document.getElementById('courseCount').textContent = courses.length;

      container.innerHTML = courses.map(c => `
        <a href="/instructor/course?id=${c.courseId}" class="card card-clickable course-card course-accent-${accentFor(c.code)}">
          <h2>${esc(c.code)} — ${esc(c.name)}</h2>
          <p class="course-card-meta">Section ${esc(c.section)} · ${esc(c.semester)}</p>
          <div class="course-card-actions">
            <span class="enrollment-code">${esc(c.enrollmentCode)}</span>
          </div>
        </a>
      `).join('');
    }

    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('createError').style.display = 'none';

      const lat = parseFloat(document.getElementById('cLat').value);
      const lng = parseFloat(document.getElementById('cLng').value);
      if (isNaN(lat) || isNaN(lng)) {
        showError('createError', 'Click the map to set a geofence center.');
        return;
      }

      const schedule = getScheduleFromSlots();
      if (schedule.length === 0) {
        showError('createError', 'Add at least one time slot.');
        return;
      }

      const res = await apiPost('/api/courses', {
        name: document.getElementById('cName').value,
        code: document.getElementById('cCode').value,
        section: document.getElementById('cSection').value,
        semester: document.getElementById('cSemester').value,
        semesterStart: document.getElementById('cStart').value,
        semesterEnd: document.getElementById('cEnd').value,
        weeklySchedule: schedule,
        geofenceLat: lat,
        geofenceLng: lng,
        geofenceRadius: parseInt(document.getElementById('cRadius').value),
      });

      if (!res) return;
      const data = await res.json();
      if (res.ok) {
        document.getElementById('createCard').style.display = 'none';
        loadCourses();
      } else {
        showError('createError', data.error);
      }
    });

    // Init
    (async () => {
      const meRes = await apiGet('/api/auth/me');
      if (!meRes || !meRes.ok) return;
      const { user } = await meRes.json();
      document.getElementById('userName').textContent = user.name;
      loadCourses();
    })();

  </script>
</body>
</html>
