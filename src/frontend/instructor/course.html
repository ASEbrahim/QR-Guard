<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Detail | QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <script src="/scripts/api.js"></script>
  <script src="/scripts/components.js"></script>
  <script>renderNavWithBack('/instructor/dashboard', 'Back to Courses');</script>

  <div class="container-wide">
    <!-- Hero: course + key info -->
    <div id="courseInfo" class="course-hero">
      <h1 id="courseTitle" class="course-hero-title">Loading...</h1>
      <p id="courseMeta" class="course-hero-meta"></p>
      <div class="course-hero-code">
        <span class="course-hero-code-label">Enrollment code</span>
        <span class="enrollment-code" id="enrollCode"></span>
      </div>
      <div class="stat-tiles">
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="geoRadius">&ndash;</span><small>m</small></div>
          <div class="stat-tile-label">Geofence</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="attWindow">&ndash;</span><small>s</small></div>
          <div class="stat-tile-label">Window</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-value"><span id="qrRefresh">&ndash;</span><small>s</small></div>
          <div class="stat-tile-label">QR refresh</div>
        </div>
      </div>
      <div class="course-hero-actions">
        <button type="button" id="deleteCourseBtn" class="btn btn-danger btn-sm">Delete course</button>
      </div>
    </div>

    <!-- Tabs: Sessions / Students. aria-controls wires each tab to its
         panel; the panels label back via aria-labelledby. tabindex=0 on
         the active tab so arrow-key nav starts there (other tabs = -1
         until focused, classic roving-tabindex). -->
    <div class="tab-bar" role="tablist" aria-label="Course tabs">
      <button type="button" class="tab-btn active" role="tab" id="tab-sessions" data-tab="sessions"
              aria-selected="true" aria-controls="sessionsPanel" tabindex="0">
        Sessions <span class="count-badge" id="sessionCount">0</span>
      </button>
      <button type="button" class="tab-btn" role="tab" id="tab-students" data-tab="students"
              aria-selected="false" aria-controls="studentsPanel" tabindex="-1">
        Students <span class="count-badge" id="studentCount">0</span>
      </button>
    </div>

    <div class="tab-panel active" id="sessionsPanel" role="tabpanel"
         aria-labelledby="tab-sessions" tabindex="0">
      <div id="sessionsList" class="list-stack"></div>
    </div>

    <div class="tab-panel" id="studentsPanel" role="tabpanel"
         aria-labelledby="tab-students" tabindex="0" hidden>
      <div id="studentsList" class="list-stack"></div>
      <p id="noStudents" class="text-muted text-center" style="display:none;">No students enrolled yet.</p>
    </div>

  </div>

  <button type="button" id="toggleAddSession" class="fab" aria-label="Add session" title="Add session">+</button>

  <!-- Delete course confirmation modal -->
  <div class="sheet-backdrop" id="deleteBackdrop"></div>
  <div class="bottom-sheet" id="deleteSheet" role="dialog" aria-labelledby="deleteTitle" aria-modal="true" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="deleteTitle">Delete this course?</h3>
      <button type="button" class="sheet-close" id="deleteSheetClose" aria-label="Close">&times;</button>
    </div>
    <p>The course will stop appearing on your dashboard and students will no longer see it. Historical attendance records and audit logs are preserved.</p>
    <div id="deleteError" class="message error" role="alert" style="display:none;"></div>
    <div class="sheet-actions">
      <button type="button" class="btn btn-secondary" id="deleteSheetCancel">Cancel</button>
      <button type="button" class="btn btn-danger" id="deleteSheetConfirm">Delete</button>
    </div>
  </div>

  <!-- Bottom sheet: Add session -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="bottom-sheet" id="addSessionSheet" role="dialog" aria-labelledby="addSessionTitle" aria-modal="true" aria-hidden="true">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="addSessionTitle">Add Session</h3>
      <button type="button" class="sheet-close" id="sheetClose" aria-label="Close">&times;</button>
    </div>

    <div class="form-group">
      <label for="sessDate">Date</label>
      <input type="date" id="sessDate">
    </div>
    <div class="sheet-time-row">
      <div class="form-group">
        <label for="sessStart">Start</label>
        <input type="time" id="sessStart">
      </div>
      <div class="form-group">
        <label for="sessEnd">End</label>
        <input type="time" id="sessEnd">
      </div>
    </div>

    <div id="sheetError" class="message error" role="alert" style="display:none;"></div>

    <div class="sheet-actions">
      <button type="button" class="btn btn-secondary" id="sheetCancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="addSessionBtn">Add Session</button>
    </div>
  </div>

  <script>
    const courseId = new URLSearchParams(window.location.search).get('id');
    if (!courseId) window.location.href = '/instructor/dashboard';

    let currentCourse = null;

    async function loadCourse() {
      // Course detail and per-session attendance counts are independent, so
      // fetch them in parallel and tolerate the attendance request failing
      // (it only feeds the count badge; the rest of the page is still useful
      // without counts).
      const [res, attRes] = await Promise.all([
        apiGet(`/api/courses/${courseId}`),
        apiGet(`/api/courses/${courseId}/attendance`),
      ]);
      if (!res || !res.ok) { window.location.href = '/instructor/dashboard'; return; }
      const { course, sessions } = await res.json();
      currentCourse = course;

      // Build a per-session count map from the per-session report. Closed
      // sessions are the only ones with finalized counts; the rest stay
      // unknown and the row falls back to the status label only.
      const countsBySession = new Map();
      if (attRes && attRes.ok) {
        const attBody = await attRes.json();
        for (const row of (attBody.sessions || [])) {
          countsBySession.set(row.session.sessionId, {
            present: row.presentCount,
            total: row.totalEnrolled,
          });
        }
      }

      document.getElementById('courseTitle').textContent = `${course.code} | ${course.name}`;
      document.getElementById('courseMeta').textContent = `Section ${course.section} · ${course.semester}`;
      document.getElementById('enrollCode').textContent = course.enrollmentCode;
      document.getElementById('geoRadius').textContent = course.geofenceRadiusM;
      document.getElementById('attWindow').textContent = course.attendanceWindowSeconds;
      document.getElementById('qrRefresh').textContent = course.qrRefreshIntervalSeconds;

      // Sessions
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const sessList = document.getElementById('sessionsList');
      document.getElementById('sessionCount').textContent = sessions.length;
      sessList.innerHTML = sessions.map(s => {
        const start = new Date(s.scheduledStart);
        const end = new Date(s.scheduledEnd);
        const statusLabel = { scheduled: 'Scheduled', active: 'Active', closed: 'Closed', cancelled: 'Cancelled' }[s.status] || s.status;

        // Build the per-session count badge for closed sessions. Color reflects
        // the percentage band so the eye can scan a column of pills and spot
        // low-attendance days.
        const counts = countsBySession.get(s.sessionId);
        let countBadge = '';
        if (counts && counts.total > 0 && s.status === 'closed') {
          const pct = (counts.present / counts.total) * 100;
          const band = pct >= 85 ? 'good' : pct >= 70 ? 'warn' : 'low';
          countBadge = `<span class="attendance-badge band-${band}">${counts.present}/${counts.total} . ${pct.toFixed(0)}%</span>`;
        }

        const actions = [];
        if (s.status === 'scheduled') {
          actions.push(`<a href="/instructor/session?id=${s.sessionId}" class="btn btn-primary btn-sm" data-stop>Start</a>`);
          actions.push(`<button class="btn btn-danger btn-sm" onclick="cancelSession('${s.sessionId}')" data-stop>Cancel</button>`);
        }
        if (s.status === 'active') {
          actions.push(`<a href="/instructor/session?id=${s.sessionId}" class="btn btn-primary btn-sm" data-stop>View QR</a>`);
        }
        // Only closed sessions have meaningful detail data to show
        const isClickable = s.status === 'closed';
        const wrapperTag = isClickable ? 'a' : 'div';
        const wrapperAttrs = isClickable
          ? `href="/instructor/session-detail?id=${s.sessionId}&courseId=${courseId}" class="session-row session-row-link session-status-${s.status}"`
          : `class="session-row session-status-${s.status}"`;

        return `<${wrapperTag} ${wrapperAttrs}>
          <div class="date-badge">
            <div class="date-badge-day">${start.getDate()}</div>
            <div class="date-badge-month">${MONTHS[start.getMonth()]}</div>
          </div>
          <div class="session-row-main">
            <div class="session-row-time">${start.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} – ${end.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
            <div class="session-row-status">${statusLabel}${countBadge}</div>
          </div>
          ${actions.length ? `<div class="session-row-actions">${actions.join('')}</div>` : ''}
        </${wrapperTag}>`;
      }).join('');

      // Prevent clicks on action buttons inside a clickable row from
      // navigating to the detail page. data-stop is the opt-in marker.
      for (const btn of sessList.querySelectorAll('[data-stop]')) {
        btn.addEventListener('click', (e) => e.stopPropagation());
      }

      // Students
      const studRes = await apiGet(`/api/courses/${courseId}/students`);
      if (!studRes || !studRes.ok) return;
      const { students } = await studRes.json();

      const studList = document.getElementById('studentsList');
      document.getElementById('studentCount').textContent = students.length;
      if (students.length === 0) {
        document.getElementById('noStudents').style.display = 'block';
        studList.innerHTML = '';
      } else {
        document.getElementById('noStudents').style.display = 'none';
        studList.innerHTML = students.map(s => {
          const initial = (s.name || '?').trim().charAt(0).toUpperCase();
          return `<div class="student-row">
            <div class="avatar">${esc(initial)}</div>
            <div class="student-row-main">
              <div class="student-row-name">${esc(s.name)}</div>
              <div class="student-row-sub">${esc(s.universityId)} &middot; ${esc(s.email)}</div>
            </div>
            <button class="icon-remove" aria-label="Remove student" onclick="removeStudent('${s.userId}')">&times;</button>
          </div>`;
        }).join('');
      }
    }

    async function cancelSession(sessionId) {
      if (!confirm('Cancel this session?')) return;
      const res = await apiPatch(`/api/courses/${courseId}/sessions/${sessionId}`, { status: 'cancelled' });
      if (res && res.ok) loadCourse();
    }

    async function removeStudent(studentId) {
      if (!confirm('Remove this student? Historical records will be retained.')) return;
      const res = await apiDelete(`/api/courses/${courseId}/students/${studentId}`);
      if (res && res.ok) loadCourse();
    }

    // Tab switching - click + keyboard (roving tabindex, ArrowLeft/Right
     // cycle). WAI-ARIA Authoring Practices "tabs" pattern.
    const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));

    function activateTab(tabId, focus = true) {
      tabButtons.forEach((b) => {
        const active = b.dataset.tab === tabId;
        b.classList.toggle('active', active);
        b.setAttribute('aria-selected', active ? 'true' : 'false');
        b.setAttribute('tabindex', active ? '0' : '-1');
        if (active && focus) b.focus();
      });
      document.querySelectorAll('.tab-panel').forEach((p) => {
        const active = p.id === `${tabId}Panel`;
        p.classList.toggle('active', active);
        p.hidden = !active;
      });
      document.getElementById('toggleAddSession').style.display = tabId === 'sessions' ? '' : 'none';
    }

    tabButtons.forEach((btn) => {
      btn.addEventListener('click', () => activateTab(btn.dataset.tab, false));
      btn.addEventListener('keydown', (e) => {
        if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight' && e.key !== 'Home' && e.key !== 'End') return;
        e.preventDefault();
        const idx = tabButtons.indexOf(btn);
        let target;
        if (e.key === 'Home') target = tabButtons[0];
        else if (e.key === 'End') target = tabButtons[tabButtons.length - 1];
        else if (e.key === 'ArrowLeft') target = tabButtons[(idx - 1 + tabButtons.length) % tabButtons.length];
        else target = tabButtons[(idx + 1) % tabButtons.length];
        activateTab(target.dataset.tab, true);
      });
    });

    // --- Add Session bottom sheet ---
    function fmtTimeInput(d) {
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    function fmtDateInput(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function setDefaultDateTime() {
      const now = new Date();
      const start = new Date(now); start.setMinutes(0, 0, 0); start.setHours(now.getHours() + 1);
      const end = new Date(start); end.setMinutes(end.getMinutes() + 75);
      document.getElementById('sessDate').value = fmtDateInput(start);
      document.getElementById('sessStart').value = fmtTimeInput(start);
      document.getElementById('sessEnd').value = fmtTimeInput(end);
    }

    function openSheet() {
      setDefaultDateTime();
      document.getElementById('sheetError').style.display = 'none';
      document.getElementById('sheetBackdrop').classList.add('open');
      const sheet = document.getElementById('addSessionSheet');
      sheet.classList.add('open');
      sheet.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      openModal(sheet);
      enableSheetDrag(sheet, closeSheet);
    }

    function closeSheet() {
      document.getElementById('sheetBackdrop').classList.remove('open');
      const sheet = document.getElementById('addSessionSheet');
      sheet.classList.remove('open');
      sheet.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      closeModal(sheet);
    }

    async function submitSession(startDate, endDate) {
      const err = document.getElementById('sheetError');
      err.style.display = 'none';
      if (!(startDate instanceof Date) || !(endDate instanceof Date) || isNaN(startDate) || isNaN(endDate)) {
        err.textContent = 'Please select a valid date and time range.';
        err.style.display = 'block';
        return;
      }
      if (endDate <= startDate) {
        err.textContent = 'End time must be after start time.';
        err.style.display = 'block';
        return;
      }
      const res = await apiPost(`/api/courses/${courseId}/sessions`, {
        scheduledStart: startDate.toISOString(),
        scheduledEnd: endDate.toISOString(),
      });
      if (res && res.ok) { closeSheet(); loadCourse(); }
    }

    document.getElementById('toggleAddSession').addEventListener('click', openSheet);
    document.getElementById('sheetClose').addEventListener('click', closeSheet);
    document.getElementById('sheetCancel').addEventListener('click', closeSheet);
    document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('addSessionSheet').classList.contains('open')) closeSheet();
    });

    document.getElementById('addSessionBtn').addEventListener('click', () => {
      const dateVal = document.getElementById('sessDate').value;
      const startVal = document.getElementById('sessStart').value;
      const endVal = document.getElementById('sessEnd').value;
      if (!dateVal || !startVal || !endVal) {
        const err = document.getElementById('sheetError');
        err.textContent = 'Fill in date, start time, and end time.';
        err.style.display = 'block';
        return;
      }
      submitSession(new Date(`${dateVal}T${startVal}`), new Date(`${dateVal}T${endVal}`));
    });

    // --- Delete course flow ---
    function openDeleteSheet() {
      document.getElementById('deleteError').style.display = 'none';
      document.getElementById('deleteBackdrop').classList.add('open');
      const sheet = document.getElementById('deleteSheet');
      sheet.classList.add('open');
      sheet.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      openModal(sheet);
      enableSheetDrag(sheet, closeDeleteSheet);
    }
    function closeDeleteSheet() {
      document.getElementById('deleteBackdrop').classList.remove('open');
      const sheet = document.getElementById('deleteSheet');
      sheet.classList.remove('open');
      sheet.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      closeModal(sheet);
    }
    document.getElementById('deleteCourseBtn').addEventListener('click', openDeleteSheet);
    document.getElementById('deleteSheetClose').addEventListener('click', closeDeleteSheet);
    document.getElementById('deleteSheetCancel').addEventListener('click', closeDeleteSheet);
    document.getElementById('deleteBackdrop').addEventListener('click', closeDeleteSheet);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('deleteSheet').classList.contains('open')) closeDeleteSheet();
    });
    document.getElementById('deleteSheetConfirm').addEventListener('click', async (e) => {
      const btn = e.currentTarget;
      const restore = setButtonLoading(btn);
      const res = await apiDelete(`/api/courses/${courseId}`);
      restore();
      if (res && res.ok) {
        window.location.href = '/instructor/dashboard';
      } else {
        const err = document.getElementById('deleteError');
        let msg = 'Could not delete the course. Try again.';
        if (res) { try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (_) {} }
        err.textContent = msg;
        err.style.display = 'block';
      }
    });

    loadCourse();
  </script>
</body>
</html>
