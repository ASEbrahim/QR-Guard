<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <img src="/assets/auk-logo.svg" alt="AUK" style="height:80px; margin-bottom:0.75rem;">
      <h1>QR-Guard</h1>
      <p>Create your AUK attendance account</p>
    </div>

    <div id="error" class="message error" style="max-width:420px;"></div>
    <div id="success" class="message success" style="max-width:420px;"></div>

    <div class="auth-card" id="registerCard">
      <form id="registerForm">
        <input type="hidden" id="role" value="student">

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Ahmad Ebrahim" required>
        </div>

        <div class="form-group">
          <label for="email">AUK Email</label>
          <input type="email" id="email" placeholder="name@auk.edu.kw" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Min 8 characters" minlength="8" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)">Show</button>
          </div>
        </div>

        <div class="form-group">
          <label for="universityId">University ID</label>
          <input type="text" id="universityId" placeholder="e.g., 57488" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Register</button>
      </form>
    </div>

    <!-- Verification code step (hidden until registration succeeds) -->
    <div class="auth-card" id="verifyCard" style="display:none;">
      <h2 style="text-align:center; margin-bottom:0.5rem;">Enter Verification Code</h2>
      <p class="text-muted" style="text-align:center; margin-bottom:1.5rem;">We sent a 6-digit code to your email</p>
      <div id="verifyError" class="message error"></div>
      <form id="verifyForm">
        <div class="form-group" style="text-align:center;">
          <input type="text" id="verifyCode" maxlength="6" placeholder="000000"
            style="text-align:center;font-size:2rem;font-weight:800;letter-spacing:0.4em;font-family:'SF Mono','Fira Code',monospace;padding:0.75rem;" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Verify</button>
      </form>
      <p class="text-center text-muted mt-2">
        <a href="#" id="resendCodeBtn">Resend code</a>
      </p>
    </div>

    <div class="auth-footer" id="authFooter">
      Already have an account? <a href="/login.html">Log in</a>
    </div>
  </div>

  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
      else { input.type = 'password'; btn.textContent = 'Show'; }
    }
  </script>
  <script src="/scripts/api.js"></script>
  <script>
    let registeredEmail = '';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('error').style.display = 'none';

      const body = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: 'student',
        universityId: document.getElementById('universityId').value,
      };

      const res = await apiPost('/api/auth/register', body);
      if (!res) return;
      const data = await res.json();

      if (res.ok) {
        registeredEmail = body.email;
        document.getElementById('registerCard').style.display = 'none';
        document.getElementById('verifyCard').style.display = '';
        document.getElementById('authFooter').style.display = 'none';
      } else {
        showError('error', data.error || 'Registration failed');
      }
    });

    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('verifyError').style.display = 'none';
      const code = document.getElementById('verifyCode').value.trim();

      const res = await apiPost('/api/auth/verify-code', { email: registeredEmail, code });
      if (!res) return;
      const data = await res.json();

      if (res.ok) {
        document.getElementById('verifyCard').innerHTML = `
          <div style="text-align:center;padding:1rem 0;">
            <div style="font-size:3rem;margin-bottom:0.75rem;">&#10003;</div>
            <h2 style="color:var(--success);margin-bottom:0.5rem;">Email Verified!</h2>
            <p class="text-muted" style="margin-bottom:1.5rem;">Your account is ready. You can now log in.</p>
            <a href="/login.html" class="btn btn-primary btn-lg">Go to Login</a>
          </div>`;
      } else {
        showError('verifyError', data.error);
      }
    });

    document.getElementById('resendCodeBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await apiPost('/api/auth/resend-verification', { email: registeredEmail });
      e.target.textContent = 'Code resent!';
      setTimeout(() => e.target.textContent = 'Resend code', 3000);
    });
  </script>
</body>
</html>
