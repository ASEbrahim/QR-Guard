<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="container">
    <h1>Create Account</h1>
    <div id="error" class="message error"></div>
    <div id="success" class="message success"></div>

    <form id="registerForm" class="card">
      <div class="form-group">
        <label for="role">I am a</label>
        <select id="role" required>
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>
      </div>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label for="email">AUK Email</label>
        <input type="email" id="email" placeholder="name@auk.edu.kw" required>
      </div>

      <div class="form-group">
        <label for="password">Password (min 8 characters)</label>
        <div class="password-wrapper">
          <input type="password" id="password" minlength="8" required>
          <button type="button" class="password-toggle" onclick="togglePassword('password', this)">&#128065;</button>
        </div>
      </div>

      <div class="form-group" id="studentIdGroup">
        <label for="universityId">University ID</label>
        <input type="text" id="universityId" placeholder="e.g., 57488">
      </div>

      <div class="form-group" id="employeeIdGroup" style="display:none">
        <label for="employeeId">Employee ID</label>
        <input type="text" id="employeeId">
      </div>

      <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>

    <p class="text-center text-muted mt-2">
      Already have an account? <a href="/login.html">Log in</a>
    </p>
  </div>

  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '\u{1F648}'; }
      else { input.type = 'password'; btn.textContent = '\u{1F441}'; }
    }
  </script>
  <script src="/scripts/api.js"></script>
  <script>
    const roleSelect = document.getElementById('role');
    roleSelect.addEventListener('change', () => {
      document.getElementById('studentIdGroup').style.display = roleSelect.value === 'student' ? '' : 'none';
      document.getElementById('employeeIdGroup').style.display = roleSelect.value === 'instructor' ? '' : 'none';
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('error').style.display = 'none';

      const role = roleSelect.value;
      const body = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role,
      };
      if (role === 'student') body.universityId = document.getElementById('universityId').value;
      if (role === 'instructor') body.employeeId = document.getElementById('employeeId').value;

      const res = await apiPost('/api/auth/register', body);
      if (!res) return;
      const data = await res.json();

      if (res.ok) {
        showSuccess('success', 'Account created! Check your email (or server console) for the verification link.');
        document.getElementById('registerForm').style.display = 'none';
      } else {
        showError('error', data.error || 'Registration failed');
      }
    });
  </script>
</body>
</html>
