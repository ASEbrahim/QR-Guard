<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — QR-Guard</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <img src="/assets/auk-logo.svg" alt="AUK" style="height:140px; margin-bottom:1rem;">
      <h1>QR-Guard</h1>
    </div>

    <div id="error" class="message error" role="alert" style="max-width:420px;"></div>
    <div id="success" class="message success" style="max-width:420px;"></div>

    <div class="auth-card" style="text-align:center;">
      <div id="loading">
        <div style="font-size:2rem; margin-bottom:0.5rem;">&#8987;</div>
        <p class="text-muted">Verifying your email...</p>
      </div>
      <div id="doneMsg" style="display:none;">
        <a href="/login" class="btn btn-primary btn-lg" style="margin-top:1rem;">Go to Login</a>
      </div>
    </div>
  </div>

  <script src="/scripts/api.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const purpose = params.get('purpose') || 'email_verify';

      if (!token) {
        document.getElementById('loading').style.display = 'none';
        showError('error', 'No verification token provided.');
        return;
      }

      const endpoint = purpose === 'device_rebind' ? '/api/auth/verify-rebind' : '/api/auth/verify-email';
      const res = await apiGet(`${endpoint}?token=${token}&purpose=${purpose}`);
      document.getElementById('loading').style.display = 'none';

      if (!res) return;
      const data = await res.json();

      if (res.ok) {
        showSuccess('success', data.message);
        document.getElementById('doneMsg').style.display = '';
      } else {
        showError('error', data.error || 'Verification failed');
      }
    })();
  </script>
</body>
</html>
